[Bridge]
Enabled=true
; dev37-ro currently fixes this name at compile time. Changing only this file
; does not rename the pipe; Control API must use the same value.
PipeName=pal-control.local.v1
ProtocolVersion=1.1
MaxFrameBytes=1048576
CommandQueueCapacity=256
MaxCommandsPerTick=4
CommandDeadlineSeconds=10

[Safety]
; dev37-ro also enforces read-only mode at compile time. These values document
; the intended package policy and cannot enable writes in this candidate.
ReadOnly=true
AllowInventoryWrites=false
AllowPalWrites=false
RequireOnlinePlayer=true
RequireBoxedPal=true
RejectUnknownGameBuild=true

[Telemetry]
LogLevel=Information
IncludePlayerNames=false
