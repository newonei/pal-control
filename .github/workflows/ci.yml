name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Build and test (Windows)
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install web dependencies
        run: npm ci

      - name: Build web applications
        run: npm run build

      - name: Restore .NET projects
        shell: pwsh
        run: |
          dotnet restore services/control-api/PalControl.ControlApi.csproj
          dotnet restore tools/bridge-smoke/PalControl.BridgeSmoke.csproj
          dotnet restore tests/contract/extraction-mode-options/PalControl.ExtractionModeOptions.ContractTests.csproj
          dotnet restore tests/settlement-saga/PalControl.SettlementSagaHarness.csproj

      - name: Build .NET projects (Release)
        shell: pwsh
        run: |
          dotnet build services/control-api/PalControl.ControlApi.csproj --configuration Release --no-restore
          dotnet build tools/bridge-smoke/PalControl.BridgeSmoke.csproj --configuration Release --no-restore
          dotnet build tests/contract/extraction-mode-options/PalControl.ExtractionModeOptions.ContractTests.csproj --configuration Release --no-restore
          dotnet build tests/settlement-saga/PalControl.SettlementSagaHarness.csproj --configuration Release --no-restore

      - name: Run contract and integration tests
        run: npm test
