name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Scan Git history for secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  verify:
    name: Build and test (Windows)
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"

      - name: Install web dependencies
        run: npm ci

      - name: Build web applications
        run: npm run build

      - name: Restore .NET projects
        shell: pwsh
        run: |
          $projects = @("services/control-api/PalControl.ControlApi.csproj") + @(
            Get-ChildItem tests, tools -Recurse -Filter *.csproj |
              Sort-Object FullName |
              ForEach-Object FullName
          )
          foreach ($project in $projects) {
            dotnet restore $project
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Build .NET projects (Release)
        shell: pwsh
        run: |
          $projects = @("services/control-api/PalControl.ControlApi.csproj") + @(
            Get-ChildItem tests, tools -Recurse -Filter *.csproj |
              Sort-Object FullName |
              ForEach-Object FullName
          )
          foreach ($project in $projects) {
            dotnet build $project --configuration Release --no-restore
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Run contract and integration tests
        run: npm test
