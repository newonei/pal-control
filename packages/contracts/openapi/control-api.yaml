          minLength: 1
          maxLength: 128
        routeHint:
          type: string
          minLength: 1
          maxLength: 512
        riskHint:
          type: string
          maxLength: 512
        mapPosition:
          $ref: "#/components/schemas/PlayerExtractionMapPoint"
        worldPosition:
          $ref: "#/components/schemas/PlayerExtractionMapPoint"
