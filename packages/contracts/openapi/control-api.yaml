          format: uuid
        currency:
          $ref: "#/components/schemas/ExtractionCurrency"
        amount:
          type: integer
          format: int64
          minimum: -9007199254740991
          maximum: 9007199254740991
        balanceAfter:
          type: integer
          format: int64
