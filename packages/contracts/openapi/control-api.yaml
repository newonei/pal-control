  /player/auth/mode:
    get:
      tags: [PlayerPortal]
      summary: Read the configured player authentication boundary
      description: >-
        Reports whether Steam OpenID is required and whether this browser has a
        short-lived, pending Steam identity. It never returns a raw SteamID.
      operationId: getPlayerAuthenticationMode
      security: []
      responses:
        "200":
          description: Authentication mode and pending-identity state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerAuthenticationMode"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/auth/steam/start:
    get:
      tags: [PlayerPortal]
      summary: Start a Steam OpenID 2.0 login
      description: >-
        Creates a single-use, short-lived login-CSRF state and redirects only to
        the configured Steam OP. Available only in OpenIdThenGameCode mode.
      operationId: startSteamOpenIdLogin
      security: []
      responses:
        "302":
          description: Redirect to the fixed Steam OpenID provider
          headers:
            Location:
              schema:
                type: string
                format: uri
            Set-Cookie:
              description: HttpOnly, Secure, SameSite=Lax one-time state cookie.
              schema:
                type: string
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/auth/steam/callback:
    get:
      tags: [PlayerPortal]
      summary: Validate the Steam OpenID callback and create a pending identity
      description: >-
        Strictly validates state, namespace, OP endpoint, claimed_id/identity,
        17-digit SteamID64, exact return_to and response_nonce, then performs a
        bounded server-to-server check_authentication POST. Success creates only
        a short-lived pending platform identity; no player session exists until
        the in-game code binds the live worldId and PlayerUID.
      operationId: completeSteamOpenIdLogin
      security: []
      parameters:
        - name: state
          in: query
          required: true
          schema:
            type: string
            pattern: "^[A-Za-z0-9_-]{43}$"
        - name: openid.mode
          in: query
          required: true
          schema:
            type: string
            const: id_res
      responses:
        "302":
          description: Pending Steam identity created; redirect to the fixed portal realm
          headers:
            Location:
              schema:
                type: string
                format: uri
            Set-Cookie:
              description: HttpOnly, Secure, SameSite=Strict pending-identity cookie.
              schema:
                type: string
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/auth/request-code:
    post:
      tags: [PlayerPortal]
      summary: Send a one-time login code to an online player in game
      description: >-
        In TrustedGameCode mode the supplied platform UserId selects the online
        recipient. In OpenIdThenGameCode mode userId must be omitted or exactly
        match the pending Steam identity and cannot select another account. A
        single explicitly allowed Origin header is required.
      operationId: requestPlayerLoginCode
      security: []
      parameters:
        - $ref: "#/components/parameters/PlayerPortalOrigin"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerLoginCodeRequest"
      responses:
        "202":
          description: One-time code was dispatched through the in-game private-message channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerLoginChallenge"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/auth/verify:
    post:
      tags: [PlayerPortal]
      summary: Verify an in-game one-time code and create a player session
      description: >-
        Consumes the challenge after successful verification and rotates the
        opaque player session. In OpenIdThenGameCode mode it first verifies and
        persists the exact current worldId + PlayerUID binding for the pending
        Steam identity; failures create no formal session. A single explicitly
        allowed Origin header is required.
      operationId: verifyPlayerLoginCode
      security: []
      parameters:
        - $ref: "#/components/parameters/PlayerPortalOrigin"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerLoginCodeVerification"
      responses:
        "200":
          description: Authenticated player session and its double-submit CSRF token
          headers:
            Set-Cookie:
              description: >-
                Opaque HttpOnly, SameSite=Strict player session cookie. Secure is
                enabled for the HTTPS deployment profile.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerPortalSession"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/auth/session:
    get:
      tags: [PlayerPortal]
      summary: Read the current authenticated player session
      description: >-
        Player identity comes only from the opaque HttpOnly session cookie. The
        returned CSRF token must be sent in X-CSRF-Token on authenticated writes.
      operationId: getPlayerPortalSession
      security:
        - playerSessionCookie: []
      responses:
        "200":
          description: Current authenticated player session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerPortalSession"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/auth/logout:
    post:
      tags: [PlayerPortal]
      summary: Revoke the current player session
      description: >-
        Requires the HttpOnly player session cookie, an explicitly allowed Origin,
        and the session CSRF token. The response deletes the session cookie.
      operationId: logoutPlayerPortalSession
      security:
        - playerSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PlayerPortalOrigin"
        - $ref: "#/components/parameters/PlayerPortalCsrfToken"
      responses:
        "204":
          description: Session revoked and cookie deleted
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/overview:
    get:
      tags: [PlayerPortal]
      summary: Get the authenticated player's extraction overview
      description: >-
        The account is selected exclusively from the HttpOnly player session;
        userId query or body overrides are forbidden.
      operationId: getPlayerPortalOverview
      security:
        - playerSessionCookie: []
      responses:
        "200":
          description: Current season, wallet balances, and extraction statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionOverview"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/new-player-activities:
    get:
      tags: [PlayerPortal]
      summary: List new-player activities published for the authenticated weekly world
      description: >-
        Player identity comes only from the opaque HttpOnly session cookie. The
        server returns only versions frozen to the account's active season and
        world, together with that account's immutable claim result when present.
      operationId: listPlayerNewPlayerActivities
      security:
        - playerSessionCookie: []
      responses:
        "200":
          description: Current-world published activity versions and claim state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewPlayerActivityAvailabilityList"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/tasks:
    get:
      tags: [PlayerPortal]
      summary: List version-pinned reliable tasks for the authenticated player
      description: >-
        Creates or reads the current daily and weekly task instances from the
        published content rotation. Progress accepts only durable server-authored
        settled-resource and delivered-order facts; there is no client event
        ingestion endpoint. Reading also retries any pending idempotent currency
        reward outbox entry.
      operationId: listPlayerReliableTasks
      security:
        - playerSessionCookie: []
      responses:
        "200":
          description: Current task progress, rewards, ranking points, and frozen content evidence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReliableTaskSnapshot"
        "401":
          $ref: "#/components/responses/PlayerPortalError"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/season-leaderboards/latest:
    get:
      tags: [PlayerPortal]
      summary: Read the authenticated player's latest frozen weekly result
      description: >-
        Selects the most recent frozen leaderboard for the configured server,
        even after the active weekly world has advanced. Identity comes only
        from the HttpOnly player session; accountId, userId, SteamID, and
        PlayerUID query overrides are rejected. If no snapshot has ever been
        frozen, this read returns HTTP 200 with status not-frozen.
      operationId: getLatestPlayerSeasonSettlement
      security:
        - playerSessionCookie: []
      responses:
        "200":
          description: Latest frozen self-only result, or an explicit not-frozen state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerSeasonSettlementResponse"
        "401":
          $ref: "#/components/responses/PlayerPortalError"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/season-leaderboards/{seasonId}:
    get:
      tags: [PlayerPortal]
      summary: Read the authenticated player's result for one frozen week
      description: >-
        Returns only the authenticated account's immutable ranking entry,
        voucher-expiry job evidence, and permanent MarketCoin decisions
        reconciled against authoritative wallet ledgers. It never returns
        another account, platform subject, PlayerUID, or global leaderboard.
      operationId: getPlayerSeasonSettlement
      security:
        - playerSessionCookie: []
      parameters:
        - name: seasonId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Frozen self-only weekly result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerSeasonSettlementResponse"
        "401":
          $ref: "#/components/responses/PlayerPortalError"
        "404":
          description: The requested frozen weekly leaderboard does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/notifications:
    get:
      tags: [PlayerPortal]
      summary: List the authenticated player's durable notification feed
      description: >-
        Returns only the account selected by the HttpOnly player session. The
        feed contains terminal order delivery, resource settlement, season-end,
        and reconciliation projections. It never exposes an account id,
        platform subject, PlayerUID, game target id, or raw source event key.
      operationId: listPlayerNotifications
      security:
        - playerSessionCookie: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Self-only notification feed and unread activity state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerNotificationFeed"
        "401":
          $ref: "#/components/responses/PlayerPortalError"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/notifications/{notificationId}/read:
    post:
      tags: [PlayerPortal]
      summary: Mark one authenticated player's notification as read
      description: >-
        The notification must belong to the session account. A notification id
        belonging to another account is indistinguishable from a missing id.
      operationId: markPlayerNotificationRead
      security:
        - playerSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/NotificationId"
        - $ref: "#/components/parameters/PlayerPortalOrigin"
        - $ref: "#/components/parameters/PlayerPortalCsrfToken"
      responses:
        "200":
          description: Idempotent read marker and remaining unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerNotificationReadResult"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/notifications/read-all:
    post:
      tags: [PlayerPortal]
      summary: Mark all authenticated player's notifications as read
      operationId: markAllPlayerNotificationsRead
      security:
        - playerSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PlayerPortalOrigin"
        - $ref: "#/components/parameters/PlayerPortalCsrfToken"
      responses:
        "200":
          description: Number of newly read notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerNotificationReadAllResult"
        "401":
          $ref: "#/components/responses/PlayerPortalError"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/team-economy:
    get:
      tags: [TeamEconomy]
      summary: Get the authenticated player's current weekly team dashboard
      description: >-
        Account, server, and weekly-world identity come only from the HttpOnly
        player session. A missing first projection is returned as not ready,
        never as fabricated zero progress. No member accountId, UserId,
        SteamID, PlayerUID, or display name is returned.
      operationId: getPlayerTeamEconomy
      security:
        - playerSessionCookie: []
      responses:
        "200":
          description: Self-only team membership, goals, contribution, and projection health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEconomyDashboard"
        "401":
          $ref: "#/components/responses/PlayerPortalError"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/team-economy/leaderboards/{metric}:
    get:
      tags: [TeamEconomy]
      summary: Get one public same-server weekly team leaderboard
      description: >-
        Returns public team names, member counts, aggregate values and ranks.
        Banned-account contributions and members are excluded; dissolved teams
        are hidden. Cross-server teams and transfers are not supported.
      operationId: getPlayerTeamEconomyLeaderboard
      security:
        - playerSessionCookie: []
      parameters:
        - name: metric
          in: path
          required: true
          schema:
            type: string
            enum: [resourceValue, taskPoints, deliveredOrders]
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            pattern: "^[0-9]+$"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Stable page ordered by value desc, reachedAt asc, teamId asc
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEconomyLeaderboardPage"
        "401":
          $ref: "#/components/responses/PlayerPortalError"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/team-economy/teams:
    post:
      tags: [TeamEconomy]
      summary: Create a team in the authenticated weekly world
      operationId: createPlayerTeamEconomyTeam
      security:
        - playerSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PlayerPortalOrigin"
        - $ref: "#/components/parameters/PlayerPortalCsrfToken"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamEconomyCreateRequest"
      responses:
        "200":
          description: Created or durably replayed team command
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEconomyMutationResponse"
        "401":
          $ref: "#/components/responses/PlayerPortalError"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/team-economy/invite/rotate:
    post:
      tags: [TeamEconomy]
      summary: Revoke old invitations and issue one new invitation
      description: >-
        Owner-only. The bearer token appears only in the first successful
        response; durable idempotent replays intentionally return token null.
        Persistence stores only a peppered HMAC digest.
      operationId: rotatePlayerTeamEconomyInvitation
      security:
        - playerSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PlayerPortalOrigin"
        - $ref: "#/components/parameters/PlayerPortalCsrfToken"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamEconomyRotateInviteRequest"
      responses:
        "200":
          description: One-time invitation metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEconomyInviteResponse"
        "401":
          $ref: "#/components/responses/PlayerPortalError"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/team-economy/join:
    post:
      tags: [TeamEconomy]
      summary: Join a same-server weekly team using an invitation
      operationId: joinPlayerTeamEconomyTeam
      security:
        - playerSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PlayerPortalOrigin"
        - $ref: "#/components/parameters/PlayerPortalCsrfToken"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamEconomyJoinRequest"
      responses:
        "200":
          description: Joined or durably replayed membership command
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEconomyMutationResponse"
        "401":
          $ref: "#/components/responses/PlayerPortalError"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/team-economy/leave:
    post:
      tags: [TeamEconomy]
      summary: Leave the authenticated player's current team
      description: Owners must transfer ownership or explicitly dissolve first.
      operationId: leavePlayerTeamEconomyTeam
      security:
        - playerSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PlayerPortalOrigin"
        - $ref: "#/components/parameters/PlayerPortalCsrfToken"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamEconomyEmptyRequest"
      responses:
        "200":
          description: Closed membership command
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEconomyMutationResponse"
        "401":
          $ref: "#/components/responses/PlayerPortalError"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/team-economy/owner/transfer:
    post:
      tags: [TeamEconomy]
      summary: Transfer team ownership to an opaque active-member handle
      operationId: transferPlayerTeamEconomyOwner
      security:
        - playerSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PlayerPortalOrigin"
        - $ref: "#/components/parameters/PlayerPortalCsrfToken"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamEconomyTransferRequest"
      responses:
        "200":
          description: Ownership transfer result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEconomyMutationResponse"
        "401":
          $ref: "#/components/responses/PlayerPortalError"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/team-economy/dissolve:
    post:
      tags: [TeamEconomy]
      summary: Dissolve the owner's current weekly team
      description: >-
        Requires the exact team name as confirmation. Historical projection
        evidence remains auditable while the team is hidden from public ranking.
      operationId: dissolvePlayerTeamEconomyTeam
      security:
        - playerSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PlayerPortalOrigin"
        - $ref: "#/components/parameters/PlayerPortalCsrfToken"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamEconomyDissolveRequest"
      responses:
        "200":
          description: Dissolved team command
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEconomyMutationResponse"
        "401":
          $ref: "#/components/responses/PlayerPortalError"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/new-player-activities/{activityKey}/versions/{version}/claim:
    post:
      tags: [PlayerPortal]
      summary: Claim one immutable new-player activity version
      description: >-
        Has no request body. Requires the authenticated player to be online with
        the same complete PlayerUID captured by the session and bound to the
        activity's frozen weekly world. Origin, CSRF, economy safety-gate, and
        account-scoped idempotency checks run before the dual-wallet transaction.
      operationId: claimPlayerNewPlayerActivity
      security:
        - playerSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/NewPlayerActivityKey"
        - $ref: "#/components/parameters/NewPlayerActivityVersion"
        - $ref: "#/components/parameters/PlayerPortalOrigin"
        - $ref: "#/components/parameters/PlayerPortalCsrfToken"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Atomically created or idempotently replayed dual-wallet grant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewPlayerActivityClaimResponse"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/extraction-zones:
    get:
      tags: [PlayerPortal]
      summary: Get extraction-zone map data for the authenticated player
      description: >-
        Returns every configured extraction point and the current player's own
        PalDefender position/range state when available. Player identity is derived
        exclusively from the HttpOnly session cookie; userId overrides are forbidden.
        Other players' positions are never returned. Static zone data remains
        available while the player is offline or position sampling is unavailable.
      operationId: getPlayerPortalExtractionZones
      security:
        - playerSessionCookie: []
      responses:
        "200":
          description: Configured extraction zones and current player's own range state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerExtractionZoneMap"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/catalog:
    get:
      tags: [PlayerPortal]
      summary: List the authenticated player's extraction shop catalog
      description: >-
        Returns current deterministic prices and purchase limits calculated for
        the account identified solely by the HttpOnly player session.
      operationId: getPlayerPortalCatalog
      security:
        - playerSessionCookie: []
      responses:
        "200":
          description: Current shop catalog and player-specific remaining limits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionCatalog"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/orders:
    get:
      tags: [PlayerPortal]
      summary: List the authenticated player's shop orders
      description: Player identity is derived exclusively from the HttpOnly session cookie.
      operationId: listPlayerPortalOrders
      security:
        - playerSessionCookie: []
      responses:
        "200":
          description: Current-season orders belonging to the authenticated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionOrderList"
        default:
          $ref: "#/components/responses/PlayerPortalError"
    post:
      tags: [PlayerPortal]
      summary: Purchase a shop product for the authenticated player
      description: >-
        The server derives player identity only from the HttpOnly session cookie
        and requires that player to be online. The request also requires an
        allowed Origin, the session CSRF token, and an Idempotency-Key.
      operationId: createPlayerPortalOrder
      security:
        - playerSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PlayerPortalOrigin"
        - $ref: "#/components/parameters/PlayerPortalCsrfToken"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlayerPortalOrderRequest"
      responses:
        "200":
          description: Idempotently created or replayed shop order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionOrder"
        "409":
          description: >-
            The submitted offer evidence is missing (`OFFER_EVIDENCE_REQUIRED`)
            or no longer matches the currently published SKU
            (`OFFER_NOT_AVAILABLE`); refresh the catalog before retrying.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/ledger:
    get:
      tags: [PlayerPortal]
      summary: List the authenticated player's wallet ledger
      description: Player identity is derived exclusively from the HttpOnly session cookie.
      operationId: listPlayerPortalLedger
      security:
        - playerSessionCookie: []
      responses:
        "200":
          description: Permanent-currency and current-season ledger entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionLedgerList"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/runs:
    get:
      tags: [PlayerPortal]
      summary: List the authenticated player's extraction settlement runs
      description: Player identity is derived exclusively from the HttpOnly session cookie.
      operationId: listPlayerPortalRuns
      security:
        - playerSessionCookie: []
      responses:
        "200":
          description: Current-season runs and configured settlement capability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRunList"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/runs/quote:
    post:
      tags: [PlayerPortal]
      summary: Create an extraction quote for the authenticated player
      description: >-
        Has no request body. Player identity is derived only from the HttpOnly
        session cookie; the operation requires an allowed Origin and CSRF token.
      operationId: createPlayerPortalExtractionQuote
      security:
        - playerSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PlayerPortalOrigin"
        - $ref: "#/components/parameters/PlayerPortalCsrfToken"
      responses:
        "200":
          description: Time-limited quote for allowlisted sellable inventory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionQuote"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/runs/{runId}/select:
    post:
      tags: [PlayerPortal]
      summary: Atomically derive a selected child quote for the authenticated player
      description: >-
        Player identity, account and season are derived only from the HttpOnly
        session. The server validates the source revision and current content
        pointer, then cancels the source and creates exactly one selected child
        in a single durable snapshot. Exact Idempotency-Key replays return that
        child after process restart; a different source, account or canonical
        selection conflicts without changing either quote.
      operationId: selectPlayerPortalExtractionQuote
      security:
        - playerSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/ExtractionRunId"
        - $ref: "#/components/parameters/PlayerPortalOrigin"
        - $ref: "#/components/parameters/PlayerPortalCsrfToken"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectPlayerPortalExtractionQuoteRequest"
      responses:
        "200":
          description: Created or exactly replayed selected child quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionQuote"
        "409":
          $ref: "#/components/responses/PlayerPortalError"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /player/me/runs/{runId}/settle:
    post:
      tags: [PlayerPortal]
      summary: Consume quoted loot and settle the authenticated player's run
      description: >-
        Has no request body. Player identity is derived only from the HttpOnly
        session cookie. The operation requires an allowed Origin, the session
        CSRF token, and an Idempotency-Key before consuming inventory or crediting
        the wallet. If the current economy content version or hash changed after
        the quote, the server returns 409 QUOTE_CONTENT_CHANGED before consuming.
      operationId: settlePlayerPortalExtractionRun
      security:
        - playerSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/ExtractionRunId"
        - $ref: "#/components/parameters/PlayerPortalOrigin"
        - $ref: "#/components/parameters/PlayerPortalCsrfToken"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Current terminal or in-progress run projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRun"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /admin/session:
    get:
      tags: [AdminSecurity]
      summary: Read the authenticated administrator identity
      operationId: getAdminSession
      responses:
        "200":
          description: Current administrator subject, expanded roles and authentication method
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/audit:
    get:
      tags: [AdminSecurity]
      summary: List recent administrator audit events
      description: Owner-only read projection. Events are append-only start and completion/failure records.
      operationId: listAdminAuditEvents
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        "200":
          description: Recent audit events in reverse insertion order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuditList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/player-identity-security-audit:
    get:
      tags: [AdminSecurity]
      summary: List redacted player authentication and moderation security events
      description: >-
        Owner-only reverse-chronological projection. Player subjects and source
        IP addresses are represented only by SHA-256 fingerprints. Verification
        codes, challenge IDs, session cookies, session tokens and CSRF tokens are
        never persisted in this audit.
      operationId: listPlayerIdentitySecurityAuditEvents
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        "200":
          description: Recent redacted identity-security events in reverse insertion order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerIdentitySecurityAuditList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/player-sessions/revoke:
    post:
      tags: [AdminSecurity]
      summary: Revoke all player-portal sessions for one bound player identity
      description: >-
        Owner-only revocation. The identifier may be the active world's complete
        PlayerUID or the normalized platform subject. Revocation does not ban the
        player, but every currently issued process session becomes invalid before
        the response is returned.
      operationId: revokePlayerPortalSessions
      parameters:
        - name: X-Correlation-ID
          in: header
          required: false
          description: Optional caller correlation value retained in both administrator and identity audits.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [serverId, playerIdentifier]
              properties:
                serverId:
                  type: string
                  minLength: 1
                  maxLength: 64
                playerIdentifier:
                  type: string
                  minLength: 3
                  maxLength: 128
      responses:
        "200":
          description: All matching process sessions were revoked
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [revokedSessions, resolvedSubjects, correlationId]
                properties:
                  revokedSessions:
                    type: integer
                    minimum: 0
                  resolvedSubjects:
                    type: integer
                    minimum: 1
                  correlationId:
                    type: string
                    minLength: 1
        "400":
          description: The server or player identifier was malformed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: No active binding or process session matched the player identifier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /economy/observability:
    get:
      tags: [EconomyObservability]
      summary: Get the latest machine-readable economy health and alert snapshot
      description: >-
        Viewer-only loopback endpoint. It exports aggregate state counts and
        latency, queue capacity and oldest age, uncertain outcomes, ledger and
        identity invariants, runtime dependency and approved version/world
        consistency, backup age, circuits and stable alert codes. It never exports player identifiers,
        session values, OTPs, cookies, tokens or passwords. The optional refresh
        performs a synchronous collection but never opens a circuit from the HTTP request.
      operationId: getEconomyObservability
      parameters:
        - name: refresh
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Latest privacy-safe economy observability snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomyObservabilitySnapshot"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /economy/analytics:
    get:
      tags: [EconomyAnalytics]
      summary: Recompute privacy-safe economy gameplay analytics
      description: >-
        Viewer-only aggregate report recomputed from authoritative SQLite
        orders, deliveries, settlement runs, ledger rows, identity bindings,
        content versions and unique server-observed portal/catalog facts. The
        route is read-only: clients cannot upload analytics events. Non-zero
        cohorts smaller than five accounts expose neither counts nor amounts,
        and no player, account or platform identifier is returned. The default
        window is the latest seven completed business days.
      operationId: getEconomyAnalytics
      parameters:
        - name: serverId
          in: query
          required: false
          description: Defaults to the configured extraction server.
          schema:
            type: string
            minLength: 1
            maxLength: 64
        - name: from
          in: query
          required: false
          description: Inclusive start date; must be no more than 92 days before `to`.
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          description: Inclusive end date.
          schema:
            type: string
            format: date
        - name: dateBasis
          in: query
          required: false
          schema:
            type: string
            enum: [business, utc]
            default: business
        - name: seasonId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: contentVersionId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          description: Shared page size for product and zone rows.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: cursor
          in: query
          required: false
          description: Opaque nextCursor value returned by the preceding page.
          schema:
            type: string
            pattern: "^[0-9]+$"
      responses:
        "200":
          description: Authoritative aggregate analytics report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomyAnalyticsReport"
        "400":
          description: Invalid date, date basis, filter or pagination input.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: The season or content version is not owned by the selected server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: An authoritative source invariant failed; analytics fail closed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /economy/metrics:
    get:
      tags: [EconomyObservability]
      summary: Scrape privacy-safe Prometheus economy metrics
      description: >-
        Viewer-only loopback Prometheus 0.0.4 export of the latest cached
        observability snapshot. Labels are restricted to stable state, alert,
        feature, queue and version metadata; no player or credential value is emitted.
      operationId: scrapeEconomyMetrics
      responses:
        "200":
          description: Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /extraction/capabilities:
    get:
      tags: [Extraction]
      summary: Get independent economy write gates
      description: >-
        Read-only compatibility endpoint for the local console. Purchase and
        resource-exchange writes are evaluated independently and fail closed
        with stable blocker codes; one unavailable adapter does not take down
        this endpoint or the readable economy projection.
      operationId: getExtractionCapabilities
      responses:
        "200":
          description: Current per-feature economy write gates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionCapabilities"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/safety-gate/{feature}:
    put:
      tags: [ExtractionAdmin]
      summary: Change one economy write circuit without restarting the service
      description: >-
        Purchase and resource-exchange circuits are independent, durable, and
        drain admitted work before a close operation completes. Dependency
        drift can still close the effective write gate while read APIs remain available.
      operationId: setEconomySafetyCircuit
      parameters:
        - name: feature
          in: path
          required: true
          schema:
            type: string
            enum: [purchase, resource-exchange]
        - $ref: "#/components/parameters/AdminTotp"
        - $ref: "#/components/parameters/AdminReason"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EconomyCircuitUpdateRequest"
      responses:
        "200":
          description: Durable state of both independent economy circuits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomySafetyGateState"
        "409":
          description: ADMIN_IDEMPOTENCY_CONFLICT when the administrator key is reused for another actor or request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/operations/overview:
    get:
      tags: [ExtractionAdmin]
      summary: Read the global privacy-safe economy operations projection
      description: >-
        Returns authoritative aggregate and account-scoped operational state without
        enumerating player routes. Account identity is exposed only as platformSubjectHash;
        raw platformSubject and PlayerUID values are never part of this contract. Runtime
        observability contains only an active-session count and aggregate GC counters; it
        never returns a session identifier, cookie, CSRF value, token or process command line.
      operationId: getEconomyOperationsOverview
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 250
            default: 100
        - name: refresh
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Current global operations projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomyOperationsOverview"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/operations/orders/{orderId}/evidence:
    get:
      tags: [ExtractionAdmin]
      summary: Read delivery evidence for one economy order
      description: Raw platform subjects and PlayerUID values are replaced by fixed-format subject hashes.
      operationId: getEconomyOperationOrderEvidence
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Immutable request, receipt and inventory-readback evidence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomyOperationOrderEvidence"
        "404":
          description: ORDER_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/operations/runs/{runId}/evidence:
    get:
      tags: [ExtractionAdmin]
      summary: Read quote and settlement evidence for one resource run
      description: Native inventory ownership is exposed only as ownerSubjectHash; raw PlayerUID is omitted.
      operationId: getEconomyOperationRunEvidence
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Frozen quote and settlement evidence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomyOperationRunEvidence"
        "404":
          description: EXTRACTION_RUN_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/new-player-activities:
    get:
      tags: [ExtractionAdmin]
      summary: List immutable and draft new-player activity versions
      operationId: listNewPlayerActivityVersions
      parameters:
        - name: activityKey
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NewPlayerActivityKey"
      responses:
        "200":
          description: Activity versions visible to an EconomyAdmin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewPlayerActivityList"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/new-player-activities/{activityKey}/versions:
    post:
      tags: [ExtractionAdmin]
      summary: Create the next draft version of a new-player activity
      description: >-
        Always creates a draft with the next monotonically increasing version.
        Published and closed versions are never edited in place.
      operationId: createNewPlayerActivityDraft
      parameters:
        - $ref: "#/components/parameters/NewPlayerActivityKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPlayerActivityDefinition"
      responses:
        "201":
          description: Newly created draft version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewPlayerActivity"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/new-player-activities/{activityKey}/versions/{version}:
    get:
      tags: [ExtractionAdmin]
      summary: Read one new-player activity version
      operationId: getNewPlayerActivityVersion
      parameters:
        - $ref: "#/components/parameters/NewPlayerActivityKey"
        - $ref: "#/components/parameters/NewPlayerActivityVersion"
      responses:
        "200":
          description: Requested version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewPlayerActivity"
        default:
          $ref: "#/components/responses/ExtractionError"
    put:
      tags: [ExtractionAdmin]
      summary: Update a draft new-player activity version
      description: Published and closed versions fail with a stable conflict code.
      operationId: updateNewPlayerActivityDraft
      parameters:
        - $ref: "#/components/parameters/NewPlayerActivityKey"
        - $ref: "#/components/parameters/NewPlayerActivityVersion"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNewPlayerActivityDraftRequest"
      responses:
        "200":
          description: Updated draft version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewPlayerActivity"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/new-player-activities/{activityKey}/versions/{version}/publish:
    post:
      tags: [ExtractionAdmin]
      summary: Publish a draft into the current weekly world
      description: >-
        High-risk EconomyAdmin operation. Publication freezes the active season
        id, exact world GUID, rewards, and content. A previous published version
        of the same activity key must be closed first.
      operationId: publishNewPlayerActivityVersion
      parameters:
        - $ref: "#/components/parameters/NewPlayerActivityKey"
        - $ref: "#/components/parameters/NewPlayerActivityVersion"
        - $ref: "#/components/parameters/AdminTotp"
        - $ref: "#/components/parameters/AdminReason"
      responses:
        "200":
          description: Published immutable version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewPlayerActivity"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/new-player-activities/{activityKey}/versions/{version}/close:
    post:
      tags: [ExtractionAdmin]
      summary: Close a published new-player activity version
      description: High-risk EconomyAdmin operation recorded by the administrator audit middleware.
      operationId: closeNewPlayerActivityVersion
      parameters:
        - $ref: "#/components/parameters/NewPlayerActivityKey"
        - $ref: "#/components/parameters/NewPlayerActivityVersion"
        - $ref: "#/components/parameters/AdminTotp"
        - $ref: "#/components/parameters/AdminReason"
      responses:
        "200":
          description: Closed immutable version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewPlayerActivity"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/overview:
    get:
      tags: [Extraction]
      summary: Get the current extraction account overview
      description: >-
        Local-console endpoint keyed by the normalized platform UserId. This
        endpoint is not a public player-authentication boundary.
      operationId: getExtractionOverview
      parameters:
        - $ref: "#/components/parameters/ExtractionUserId"
      responses:
        "200":
          description: Current season, wallet balances, and extraction statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionOverview"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/catalog:
    get:
      tags: [Extraction]
      summary: List the current extraction shop catalog
      operationId: getExtractionCatalog
      parameters:
        - name: userId
          in: query
          required: false
          description: >-
            Normalized platform UserId. When supplied, purchased and remaining
            weekly-limit values are calculated for that account.
          schema:
            $ref: "#/components/schemas/ExtractionUserId"
      responses:
        "200":
          description: Current deterministic daily prices and per-season limits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionCatalog"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/orders:
    get:
      tags: [Extraction]
      summary: List extraction shop orders for an account
      operationId: listExtractionOrders
      parameters:
        - $ref: "#/components/parameters/ExtractionUserId"
      responses:
        "200":
          description: Orders in the current season
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionOrderList"
        default:
          $ref: "#/components/responses/ExtractionError"
    post:
      tags: [Extraction]
      summary: Purchase one extraction shop product
      description: >-
        Requires the player to be online. The server calculates price, limits,
        debit, and PalDefender delivery from the current product snapshot.
      operationId: createExtractionOrder
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExtractionOrderRequest"
      responses:
        "200":
          description: Idempotently created or replayed order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionOrder"
        "409":
          description: >-
            The submitted offer evidence is missing (`OFFER_EVIDENCE_REQUIRED`)
            or stale (`OFFER_NOT_AVAILABLE`); refresh the catalog before retrying.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/ledger:
    get:
      tags: [Extraction]
      summary: List wallet ledger entries for an extraction account
      operationId: listExtractionLedger
      parameters:
        - $ref: "#/components/parameters/ExtractionUserId"
      responses:
        "200":
          description: Permanent-currency and current-season ledger entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionLedgerList"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/runs:
    get:
      tags: [Extraction]
      summary: List extraction settlement runs
      operationId: listExtractionRuns
      parameters:
        - $ref: "#/components/parameters/ExtractionUserId"
      responses:
        "200":
          description: Current-season runs and configured settlement capability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRunList"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/runs/quote:
    post:
      tags: [Extraction]
      summary: Scan eligible inventory and create an extraction quote
      description: >-
        Requires an online player who remains inside one configured extraction
        zone for both position samples. A new quote replaces an older open quote.
      operationId: createExtractionQuote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExtractionQuoteRequest"
      responses:
        "200":
          description: Time-limited quote for every allowlisted sellable item found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionQuote"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/runs/{runId}/select:
    post:
      tags: [Extraction]
      summary: Atomically derive a selected resource quote
      description: >-
        Administrative compatibility endpoint. The source quote is cancelled
        and its selected child is created in one durable run-store snapshot.
        The request must carry the source revision, authenticated target UserId,
        one to 64 unique quoted ItemIDs, safe quantities, and Idempotency-Key.
      operationId: selectExtractionQuote
      parameters:
        - $ref: "#/components/parameters/ExtractionRunId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectExtractionQuoteRequest"
      responses:
        "200":
          description: Created or exactly replayed selected child quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionQuote"
        "409":
          $ref: "#/components/responses/ExtractionError"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/runs/{runId}/settle:
    post:
      tags: [Extraction]
      summary: Consume quoted loot and settle an extraction run
      description: >-
        In production, dispatches an exact Native inventory.consume request,
        persists and validates the complete removal receipt, and only then
        credits the current-season voucher. The RCON compatibility adapter is
        restricted to explicitly configured Development environments. If the
        current economy content version or hash changed after the quote, the
        server returns 409 QUOTE_CONTENT_CHANGED before consuming.
      operationId: settleExtractionRun
      parameters:
        - $ref: "#/components/parameters/ExtractionRunId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettleExtractionRunRequest"
      responses:
        "200":
          description: Current terminal or in-progress run projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRun"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/wallet-adjustments:
    post:
      tags: [ExtractionAdmin]
      summary: Apply an idempotent extraction-wallet adjustment
      description: Loopback-only operator endpoint. Delta cannot be zero.
      operationId: adjustExtractionWallet
      parameters:
        - $ref: "#/components/parameters/AdminTotp"
        - $ref: "#/components/parameters/AdminReason"
        - name: Idempotency-Key
          in: header
          required: true
          description: >-
            Current implementation requires a single value with at least eight
            characters on this administrator endpoint.
          schema:
            type: string
            minLength: 8
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractionWalletAdjustmentRequest"
      responses:
        "200":
          description: Created or replayed wallet ledger adjustment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionWalletAdjustmentResponse"
        "409":
          description: ADMIN_IDEMPOTENCY_CONFLICT or a wallet-state conflict.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/orders/{orderId}/reconcile:
    post:
      tags: [ExtractionAdmin]
      summary: Manually resolve an uncertain shop delivery during maintenance
      operationId: reconcileExtractionOrder
      parameters:
        - $ref: "#/components/parameters/AdminTotp"
        - $ref: "#/components/parameters/AdminReason"
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 8
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractionOrderReconciliationRequest"
      responses:
        "200":
          description: Reconciled order projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionOrder"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/runs/{runId}/reconcile:
    post:
      tags: [ExtractionAdmin]
      summary: Manually resolve an uncertain extraction run during maintenance
      operationId: reconcileExtractionRun
      parameters:
        - $ref: "#/components/parameters/AdminTotp"
        - $ref: "#/components/parameters/AdminReason"
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractionRunReconciliationRequest"
      responses:
        "200":
          description: Reconciled extraction-run projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRun"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/settlement/status:
    get:
      tags: [ExtractionAdmin]
      summary: Probe the active resource-settlement adapter
      operationId: getExtractionSettlementStatus
      responses:
        "200":
          description: Adapter-neutral Native or development-RCON settlement status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionSettlementStatus"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/rcon/status:
    get:
      tags: [ExtractionAdmin]
      summary: Deprecated alias for the adapter-neutral settlement status
      deprecated: true
      operationId: getExtractionRconStatus
      responses:
        "200":
          description: Adapter-neutral settlement status (deprecated path)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionSettlementStatus"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/rollover/maintenance:
    post:
      tags: [ExtractionAdmin]
      summary: Open or close the extraction write gate
      operationId: setExtractionRolloverMaintenance
      parameters:
        - $ref: "#/components/parameters/AdminTotp"
        - $ref: "#/components/parameters/AdminReason"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractionRolloverMaintenanceRequest"
      responses:
        "200":
          description: Persisted operation-gate state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionOperationGateState"
        "409":
          description: ADMIN_IDEMPOTENCY_CONFLICT when the administrator key is reused for another actor or request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/rollover/preflight:
    get:
      tags: [ExtractionAdmin]
      summary: Verify season timing and current world before any shutdown
      operationId: getExtractionRolloverPreflight
      responses:
        "200":
          description: Fail-closed timing and world-identity decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRolloverPreflight"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/rollover/readiness:
    get:
      tags: [ExtractionAdmin]
      summary: Inspect blockers before switching the active world
      operationId: getExtractionRolloverReadiness
      responses:
        "200":
          description: Maintenance state and unresolved economy operations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRolloverReadiness"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/rollover/commit:
    post:
      tags: [ExtractionAdmin]
      summary: Bind a DedicatedServerName to the current extraction season
      description: The write gate must already be in maintenance mode.
      operationId: commitExtractionRollover
      parameters:
        - $ref: "#/components/parameters/AdminTotp"
        - $ref: "#/components/parameters/AdminReason"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractionRolloverCommitRequest"
      responses:
        "200":
          description: Updated current-season world binding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRolloverCommitResponse"
        default:
          $ref: "#/components/responses/ExtractionError"
  /admin/economy-continuity/capacity:
    get:
      tags: [ExtractionAdmin]
      summary: Estimate authoritative-state backup capacity without deleting data
      operationId: getEconomyContinuityCapacity
      responses:
        "200":
          description: Current bytes, retained estimate, required free space and capacity decision
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: "#/components/responses/ExtractionError"
  /admin/economy-continuity/retention-plan:
    get:
      tags: [ExtractionAdmin]
      summary: List old economy backups eligible for separately approved cleanup
      operationId: planEconomyBackupRetention
      responses:
        "200":
          description: Plan-only result; this endpoint never deletes a backup or world
          content:
            application/json:
              schema:
                type: object
                required: [deleteAutomatically, candidates]
                properties:
                  deleteAutomatically:
                    type: boolean
                    const: false
                  candidates:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        default:
          $ref: "#/components/responses/ExtractionError"
  /admin/economy-continuity/snapshots:
    post:
      tags: [ExtractionAdmin]
      summary: Create a WAL-consistent economy snapshot under maintenance
      operationId: createEconomySnapshot
      parameters:
        - $ref: "#/components/parameters/AdminTotp"
        - $ref: "#/components/parameters/AdminReason"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [serverId, worldId]
              properties:
                serverId:
                  type: string
                  minLength: 1
                  maxLength: 64
                worldId:
                  type: string
                  pattern: "^[A-Fa-f0-9]{32}$"
                idempotencyKey:
                  type: [string, "null"]
                  minLength: 16
                  maxLength: 128
                  description: Use the durable rollover economy-backup step key.
      responses:
        "200":
          description: Verified snapshot manifest; an idempotent replay returns the same backupId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomySnapshotManifest"
        default:
          $ref: "#/components/responses/ExtractionError"
  /admin/economy-continuity/snapshots/{serverId}/{backupId}/verify:
    get:
      tags: [ExtractionAdmin]
      summary: Verify snapshot manifest, files and SQLite integrity
      operationId: verifyEconomySnapshot
      parameters:
        - name: serverId
          in: path
          required: true
          schema:
            type: string
        - name: backupId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verified snapshot manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomySnapshotManifest"
        default:
          $ref: "#/components/responses/ExtractionError"
  /admin/economy-continuity/snapshots/{serverId}/{backupId}/stage:
    post:
      tags: [ExtractionAdmin]
      summary: Restore one economy snapshot to an isolated fail-closed staging directory
      description: >-
        A replay for the same backup and expected world revalidates and returns
        the already atomically published staging result. It never creates a
        second staging copy or promotes staging into production.
      operationId: stageEconomySnapshot
      parameters:
        - name: serverId
          in: path
          required: true
          schema:
            type: string
        - name: backupId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/AdminTotp"
        - $ref: "#/components/parameters/AdminReason"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [expectedWorldId]
              properties:
                expectedWorldId:
                  type: string
                  pattern: "^[A-Fa-f0-9]{32}$"
      responses:
        "200":
          description: Hash, integrity, replay, active-world, ledger and fail-closed result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: "#/components/responses/ExtractionError"
  /admin/economy-continuity/snapshots/{serverId}/{backupId}/post-snapshot:
    get:
      tags: [ExtractionAdmin]
      summary: List events and unresolved transactions requiring recovery reconciliation
      operationId: listPostEconomySnapshotTransactions
      parameters:
        - name: serverId
          in: path
          required: true
          schema:
            type: string
        - name: backupId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reconciliation items after the snapshot sequence plus current blockers
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/EconomyPendingTransaction"
        default:
          $ref: "#/components/responses/ExtractionError"
  /admin/weekly-rollover/operations:
    post:
      tags: [ExtractionAdmin]
      summary: Prepare or replay a deterministic persistent weekly rollover
      operationId: prepareWeeklyRollover
      parameters:
        - $ref: "#/components/parameters/AdminTotp"
        - $ref: "#/components/parameters/AdminReason"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [serverId, fromSeasonId, fromWorldId, targetWorldId, rulesVersion]
              properties:
                serverId:
                  type: string
                  minLength: 1
                  maxLength: 64
                fromSeasonId:
                  type: string
                  format: uuid
                fromWorldId:
                  type: string
                  pattern: "^[A-Fa-f0-9]{32}$"
                targetWorldId:
                  type: string
                  pattern: "^[A-Fa-f0-9]{32}$"
                rulesVersion:
                  type: string
                  minLength: 1
                  maxLength: 128
      responses:
        "200":
          description: Persistent operation and deterministic key for the required phase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyRolloverResponse"
        default:
          $ref: "#/components/responses/ExtractionError"
  /admin/weekly-rollover/operations/active:
    get:
      tags: [ExtractionAdmin]
      summary: Resume the server's one incomplete weekly rollover after restart
      operationId: getActiveWeeklyRollover
      parameters:
        - name: serverId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Incomplete rollover and its required step key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyRolloverResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /admin/weekly-rollover/operations/{operationId}:
    get:
      tags: [ExtractionAdmin]
      summary: Get one persistent weekly rollover
      operationId: getWeeklyRollover
      parameters:
        - name: operationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Rollover state and its required step key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyRolloverResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /admin/weekly-rollover/operations/{operationId}/steps/{step}:
    post:
      tags: [ExtractionAdmin]
      summary: Commit verified evidence for exactly the currently required rollover phase
      operationId: completeWeeklyRolloverStep
      parameters:
        - name: operationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: step
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WeeklyRolloverStep"
        - $ref: "#/components/parameters/AdminTotp"
        - $ref: "#/components/parameters/AdminReason"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [stepKey, evidence]
              properties:
                stepKey:
                  type: string
                  pattern: "^[a-f0-9]{64}$"
                evidence:
                  $ref: "#/components/schemas/WeeklyRolloverEvidence"
      responses:
        "200":
          description: Applied transition or byte-for-byte idempotent evidence replay
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: "#/components/responses/ExtractionError"
  /admin/season-settlement-jobs/voucher-expiry:
    post:
      tags: [ExtractionAdmin]
      summary: Freeze the one versioned SeasonVoucher-expiry job for a season
      operationId: prepareSeasonVoucherExpiry
      parameters:
        - $ref: "#/components/parameters/AdminTotp"
        - $ref: "#/components/parameters/AdminReason"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [seasonId, rulesVersion]
              properties:
                seasonId:
                  type: string
                  format: uuid
                rulesVersion:
                  type: string
                  minLength: 1
                  maxLength: 128
      responses:
        "200":
          description: Frozen per-account expiry job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeasonSettlementJob"
        default:
          $ref: "#/components/responses/ExtractionError"
  /admin/season-settlement-jobs/rewards:
    post:
      tags: [ExtractionAdmin]
      summary: Freeze a versioned idempotent weekly reward batch
      operationId: prepareSeasonRewardJob
      parameters:
