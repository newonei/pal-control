      properties:
        userId:
          $ref: "#/components/schemas/PlayerPortalUserId"
    PlayerLoginChallenge:
      type: object
      additionalProperties: false
      required: [challengeId, expiresAt, retryAfterSeconds, delivery]
      properties:
        challengeId:
          type: string
          description: Opaque identifier for the single-use login challenge.
          pattern: "^[A-Za-z0-9_-]{43}$"
        expiresAt:
          type: string
          format: date-time
        retryAfterSeconds:
          type: integer
          minimum: 1
        delivery:
          type: string
          const: in-game
    PlayerLoginCodeVerification:
      type: object
      additionalProperties: false
      required: [challengeId, code]
      properties:
        challengeId:
          type: string
          pattern: "^[A-Za-z0-9_-]{43}$"
        code:
          type: string
          description: Eight-digit one-time code delivered privately in game.
          pattern: "^[0-9]{8}$"
    PlayerPortalSession:
      type: object
      additionalProperties: false
      required: [authenticated, userId, displayName, csrfToken, expiresAt]
      properties:
        authenticated:
          type: boolean
          const: true
        userId:
          $ref: "#/components/schemas/PlayerPortalUserId"
        displayName:
          type: [string, "null"]
          description: Reserved for a resolved in-game display name; currently null.
        csrfToken:
          type: string
          description: Send as X-CSRF-Token on authenticated player-portal writes.
          pattern: "^[A-Za-z0-9_-]{43}$"
        expiresAt:
          type: string
          format: date-time
    CreatePlayerPortalOrderRequest:
      type: object
      additionalProperties: false
      required: [productId, quantity]
