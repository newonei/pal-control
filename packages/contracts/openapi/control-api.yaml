      operationId: listExtractionLedger
      parameters:
        - $ref: "#/components/parameters/ExtractionUserId"
      responses:
        "200":
          description: Permanent-currency and current-season ledger entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionLedgerList"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/runs:
    get:
      tags: [Extraction]
      summary: List extraction settlement runs
      operationId: listExtractionRuns
      parameters:
        - $ref: "#/components/parameters/ExtractionUserId"
      responses:
        "200":
          description: Current-season runs and configured settlement capability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRunList"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/runs/quote:
    post:
      tags: [Extraction]
      summary: Scan eligible inventory and create an extraction quote
      description: >-
        Requires an online player who remains inside one configured extraction
        zone for both position samples. A new quote replaces an older open quote.
      operationId: createExtractionQuote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExtractionQuoteRequest"
      responses:
        "200":
          description: Time-limited quote for every allowlisted sellable item found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionQuote"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/runs/{runId}/settle:
    post:
      tags: [Extraction]
      summary: Consume quoted loot and settle an extraction run
      description: >-
        Dispatches the allowlisted RCON deletion, requires a matching REST
        inventory readback, and only then credits the current-season voucher.
      operationId: settleExtractionRun
      parameters:
        - $ref: "#/components/parameters/ExtractionRunId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettleExtractionRunRequest"
      responses:
        "200":
          description: Current terminal or in-progress run projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRun"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/wallet-adjustments:
    post:
      tags: [ExtractionAdmin]
      summary: Apply an idempotent extraction-wallet adjustment
      description: Loopback-only operator endpoint. Delta cannot be zero.
      operationId: adjustExtractionWallet
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: >-
            Current implementation requires a single value with at least eight
            characters on this administrator endpoint.
          schema:
            type: string
            minLength: 8
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractionWalletAdjustmentRequest"
      responses:
        "200":
          description: Created or replayed wallet ledger adjustment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionWalletAdjustmentResponse"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/orders/{orderId}/reconcile:
    post:
      tags: [ExtractionAdmin]
      summary: Manually resolve an uncertain shop delivery during maintenance
      operationId: reconcileExtractionOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 8
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractionOrderReconciliationRequest"
      responses:
        "200":
          description: Reconciled order projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionOrder"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/runs/{runId}/reconcile:
    post:
      tags: [ExtractionAdmin]
      summary: Manually resolve an uncertain extraction run during maintenance
      operationId: reconcileExtractionRun
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractionRunReconciliationRequest"
      responses:
        "200":
          description: Reconciled extraction-run projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRun"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/rcon/status:
    get:
      tags: [ExtractionAdmin]
      summary: Probe extraction RCON configuration and authentication
      operationId: getExtractionRconStatus
      responses:
        "200":
          description: RCON capability probe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRconStatus"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/rollover/maintenance:
    post:
      tags: [ExtractionAdmin]
      summary: Open or close the extraction write gate
      operationId: setExtractionRolloverMaintenance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractionRolloverMaintenanceRequest"
      responses:
        "200":
          description: Persisted operation-gate state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionOperationGateState"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/rollover/preflight:
    get:
      tags: [ExtractionAdmin]
      summary: Verify season timing and current world before any shutdown
      operationId: getExtractionRolloverPreflight
      responses:
        "200":
          description: Fail-closed timing and world-identity decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRolloverPreflight"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/rollover/readiness:
    get:
      tags: [ExtractionAdmin]
      summary: Inspect blockers before switching the active world
      operationId: getExtractionRolloverReadiness
      responses:
        "200":
          description: Maintenance state and unresolved economy operations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRolloverReadiness"
        default:
          $ref: "#/components/responses/ExtractionError"
  /extraction/admin/rollover/commit:
    post:
      tags: [ExtractionAdmin]
      summary: Bind a DedicatedServerName to the current extraction season
      description: The write gate must already be in maintenance mode.
      operationId: commitExtractionRollover
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractionRolloverCommitRequest"
      responses:
        "200":
          description: Updated current-season world binding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionRolloverCommitResponse"
        default:
          $ref: "#/components/responses/ExtractionError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    playerSessionCookie:
      type: apiKey
      in: cookie
      name: pal_player_session
      description: >-
        Opaque player session set only after successful in-game OTP verification.
        The deployment uses an HttpOnly, SameSite=Strict cookie scoped to
        /api/v1/player and enables Secure behind HTTPS. Authenticated player
        identity is derived exclusively from this cookie, never from a userId
        query parameter or business request body.
  parameters:
    ServerId:
      name: serverId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    PlayerId:
      name: playerId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    InstanceId:
      name: instanceId
      in: path
      required: true
      description: Stable Pal instance identifier, never a list index
      schema:
        type: string
        minLength: 1
    NotificationId:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BackupId:
      name: backupId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: "^[A-Za-z0-9][A-Za-z0-9._-]*$"
    SaveCommandId:
      name: commandId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    PlayerPortalOrigin:
      name: Origin
      in: header
      required: true
      description: >-
        Every player-portal POST requires exactly one Origin value that exactly
        matches an explicitly configured PlayerPortal allowed origin.
      schema:
        type: string
        format: uri
    PlayerPortalCsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      description: >-
        Per-session token returned by OTP verification or the session read. It is
        required in addition to the HttpOnly session cookie on authenticated writes.
      schema:
        type: string
        pattern: "^[A-Za-z0-9_-]{43}$"
    ExtractionUserId:
      name: userId
      in: query
      required: true
      description: Normalized cross-season platform UserId, never a display name or PlayerUID.
      schema:
        $ref: "#/components/schemas/ExtractionUserId"
    ExtractionRunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PalDefenderPlayerIdentifier:
      name: playerIdentifier
      in: path
      required: true
      description: PalDefender accepts a supported player name, UserId, or platform identifier.
      schema:
        type: string
        minLength: 1
        maxLength: 160
    PalDefenderGuildId:
      name: guildId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 160
    PalDefenderBaseCampId:
      name: baseCampId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PalDefenderUserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 160
    PalDefenderIp:
      name: ip
      in: path
      required: true
      description: A syntactically valid IPv4 or IPv6 address.
      schema:
        type: string
        minLength: 2
        maxLength: 45
    PalDefenderCommandId:
      name: commandId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: ETag returned by the last read
      schema:
        type: string
  responses:
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ApiError"
    AcceptedCommand:
      description: Command accepted for asynchronous processing
      headers:
        Location:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AcceptedCommand"
    Conflict:
      description: Player session, Pal state, or idempotency conflict
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ApiError"
    PreconditionFailed:
      description: Revision mismatch; re-read and review the diff
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ApiError"
    PlayerOffline:
      description: Live editing is restricted to an online player
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unavailable:
      description: Required Palworld adapter is unavailable or in safe mode
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    PalDefenderUpstreamResponse:
      description: >-
        PalDefender upstream status, JSON, or text passed through synchronously.
        The Control API never exposes the upstream bearer token.
      content:
        application/json:
          schema: {}
        text/plain:
          schema:
            type: string
    PalDefenderUnavailable:
      description: PalDefender is disabled, timed out, or unavailable before a read completed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PalDefenderTransportError"
    PalDefenderCommandAccepted:
      description: PalDefender command durably accepted or still in progress
      headers:
        Location:
          description: Command status URL.
          schema: { type: string }
        Retry-After:
          description: Suggested status polling delay in seconds.
          schema: { type: integer, minimum: 0 }
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PalDefenderCommand"
    PalDefenderCommandComplete:
      description: Idempotent replay of a command that already reached a terminal state
      headers:
        Location:
          description: Command status URL.
          schema: { type: string }
        Retry-After:
          description: Suggested status polling delay in seconds.
          schema: { type: integer, minimum: 0 }
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PalDefenderCommand"
    PalDefenderBadRequest:
      description: >-
        Invalid path value, Idempotency-Key, reason, command envelope, IP address,
        base camp ID, or payload larger than 64 KiB.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    PalDefenderQueueUnavailable:
      description: Durable PalDefender queue or audit persistence is unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    ExtractionError:
      description: Extraction-mode validation, state, persistence, or adapter error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    PlayerPortalError:
      description: >-
        Player authentication, Origin, CSRF, session, validation, economy state,
        persistence, delivery, or traffic-boundary error. Authentication failures
        use HTTP 401, Origin and CSRF failures use HTTP 403, request bodies over
        16 KiB use HTTP 413, and login or per-IP traffic throttling uses HTTP 429.
      headers:
        Retry-After:
          description: Present on login cooldowns and player-portal traffic throttling.
          schema:
            type: integer
            minimum: 1
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
  requestBodies:
    PalDefenderCommand:
      required: true
      description: >-
        Durable command envelope. payload is forwarded to the selected PalDefender
        endpoint only after the accepted event is flushed to disk. Its compact
        UTF-8 JSON representation must not exceed 64 KiB.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PalDefenderCommandRequest"
  schemas:
    ServerConfigurationDocument:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - revision
        - options
        - filePath
        - defaultFilePath
        - lastModifiedAt
      properties:
        schemaVersion:
          type: integer
          const: 2
        revision:
          type: string
          minLength: 1
          description: Opaque content revision required by the next update.
        options:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ServerConfigurationOption"
        filePath:
          type: string
          minLength: 1
        defaultFilePath:
          type: string
          minLength: 1
        lastModifiedAt:
          type: string
          format: date-time
    ServerConfigurationOption:
      type: object
      additionalProperties: false
      required:
        - key
        - kind
        - value
        - defaultValue
        - sensitive
        - hasValue
        - allowedValues
        - minimum
        - maximum
        - step
        - customized
      properties:
        key:
          type: string
          minLength: 1
        kind:
          type: string
          enum: [boolean, integer, number, string, enum, string-list]
          description: Inferred UI value kind.
        value:
          $ref: "#/components/schemas/ServerConfigurationValue"
        defaultValue:
          $ref: "#/components/schemas/ServerConfigurationValue"
        sensitive:
          type: boolean
        hasValue:
          type: boolean
          description: Indicates whether a sensitive setting is configured without exposing it.
        allowedValues:
          oneOf:
            - type: array
              items:
                type: string
            - type: "null"
        minimum:
          oneOf:
            - type: number
            - type: "null"
        maximum:
          oneOf:
            - type: number
            - type: "null"
        step:
          oneOf:
            - type: number
              exclusiveMinimum: 0
            - type: "null"
        customized:
          type: boolean
          description: True when the current serialized value differs from the bundled default.
    ServerConfigurationUpdate:
      type: object
      additionalProperties: false
      required: [revision, changes]
      properties:
        revision:
          type: string
          minLength: 1
        changes:
          type: object
          maxProperties: 256
          description: Only settings explicitly changed by the operator.
          additionalProperties:
            $ref: "#/components/schemas/ServerConfigurationChangeValue"
    ServerConfigurationValue:
      oneOf:
        - type: boolean
        - type: number
        - type: string
        - type: array
          items:
            type: string
        - type: "null"
    ServerConfigurationChangeValue:
      description: >-
        A string, number, boolean, or string list. Null explicitly clears a
        sensitive setting and is rejected for non-sensitive settings.
      oneOf:
        - type: boolean
        - type: number
        - type: string
        - type: array
          items:
            type: string
        - type: "null"
    ValidationProblemDetails:
      type: object
      required: [title, status, errors]
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
          const: 400
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        traceId:
          type: string
    GameResourceCatalog:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - revision
        - generatedAt
        - source
        - coverage
        - items
        - pals
        - eggs
        - technologies
        - templates
      properties:
        schemaVersion:
          type: string
          const: "1"
        revision:
          type: string
          minLength: 18
          description: >-
            Bundled snapshot revision suffixed with a 16-character SHA-256
            digest of the current server template filenames and file hashes.
        generatedAt:
          type: string
          format: date-time
        source:
          $ref: "#/components/schemas/GameCatalogSource"
        coverage:
          $ref: "#/components/schemas/GameCatalogCoverage"
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/GameCatalogEntry"
        pals:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/GameCatalogEntry"
        eggs:
          type: array
          items:
            $ref: "#/components/schemas/GameCatalogEntry"
        technologies:
          type: array
          items:
            $ref: "#/components/schemas/GameCatalogEntry"
        templates:
          type: array
          description: >-
            Metadata for top-level JSON files in PalDefender/Pals/Templates.
            The template contents are intentionally omitted.
          items:
            $ref: "#/components/schemas/PalTemplateCatalogEntry"
    GameCatalogSource:
      type: object
      additionalProperties: false
      required: [name, note, itemsUrl, palsUrl, technologiesUrl, palNamesUrl, palNamesLicense]
      properties:
        name:
          type: string
          minLength: 1
        note:
          type: string
          minLength: 1
        itemsUrl:
          type: string
          format: uri
        palsUrl:
          type: string
          format: uri
        technologiesUrl:
          type: string
          format: uri
        palNamesUrl:
          type: string
          format: uri
          description: Versioned source of Simplified Chinese Pal display names.
        palNamesLicense:
          type: string
          const: MIT
    GameCatalogCoverage:
      type: object
      additionalProperties: false
      required: [items, pals, eggs, technologies, templates]
      properties:
        items:
          type: string
          const: reference
        pals:
          type: string
          const: reference-zh-Hans
        eggs:
          type: string
          const: paldefender-documented
        technologies:
          type: string
          const: reference
        templates:
          type: string
          const: server-verified
    GameCatalogEntry:
      type: object
      additionalProperties: false
      required: [id, name, category, dex]
      properties:
        id:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        englishName:
          type: [string, "null"]
          description: English display name when the primary name is localized; null when unavailable.
        category:
          type: string
          minLength: 1
        dex:
          type: [string, "null"]
          description: Paldeck dex key for Pal entries; null for other resource types.
    PalTemplateCatalogEntry:
      type: object
      additionalProperties: false
      required:
        - fileName
        - palId
        - nickname
        - level
        - shiny
        - passiveCount
        - activeSkillCount
        - sizeBytes
        - lastModifiedAt
        - sha256
        - parseable
        - selectable
        - riskLevel
        - summary
      properties:
        fileName:
          type: string
          minLength: 1
          description: Basename only; paths and template JSON are not returned.
        palId:
          type: [string, "null"]
        nickname:
          type: [string, "null"]
        level:
          type: [integer, "null"]
          format: int32
        shiny:
          type: [boolean, "null"]
        passiveCount:
          type: integer
          format: int32
          minimum: 0
        activeSkillCount:
          type: integer
          format: int32
          minimum: 0
        sizeBytes:
          type: integer
          format: int64
          minimum: 0
        lastModifiedAt:
          type: string
          format: date-time
        sha256:
          type: string
          pattern: "^$|^[0-9a-f]{64}$"
          description: Empty only when the template could not safely be read or hashed.
        parseable:
          type: boolean
        selectable:
          type: boolean
        riskLevel:
          type: string
          enum: [standard, elevated, high, invalid]
        summary:
          type: string
          minLength: 1
    PalDefenderCommandRequest:
      type: object
      additionalProperties: false
      required: [reason, payload]
      properties:
        reason:
          type: string
          minLength: 3
          maxLength: 500
          description: Human review and audit reason; control characters are rejected.
        payload:
          description: >-
            Exact JSON payload for the selected PalDefender POST endpoint. Use
            null for an upstream endpoint that takes no body.
    PalDefenderCatalog:
      type: object
      additionalProperties: false
      required: [basePath, count, items]
      properties:
        basePath:
          type: string
          pattern: "^/api/v1/servers/[^/]+/paldefender$"
        count:
          type: integer
          const: 27
        items:
          type: array
          minItems: 27
          maxItems: 27
          items:
            $ref: "#/components/schemas/PalDefenderCatalogEntry"
    PalDefenderCatalogEntry:
      type: object
      additionalProperties: false
      required: [method, path, permission, description]
      properties:
        method:
          type: string
          enum: [GET, POST]
        path:
          type: string
        permission:
          type: string
        description:
          type: string
    PalDefenderStatus:
      type: object
      additionalProperties: false
      required: [enabled, connected, baseUrl, version, error]
      properties:
        enabled:
          type: boolean
        connected:
          type: boolean
        baseUrl:
          type: string
          format: uri
          description: Must resolve to a loopback HTTP URL ending in a slash.
        version:
          description: Exact JSON returned by PalDefender GET /version, or null.
        upstreamStatus:
          type: [integer, "null"]
          minimum: 100
          maximum: 599
        error:
          oneOf:
            - $ref: "#/components/schemas/ApiError"
            - type: "null"
    PalDefenderTransportError:
      type: object
      additionalProperties: false
      required: [error, outcomeUncertain]
      properties:
        error:
          $ref: "#/components/schemas/ApiError"
        outcomeUncertain:
          type: boolean
          description: False for synchronous GET operations.
    PalDefenderCommand:
      type: object
      additionalProperties: false
      required: [commandId, state, createdAt, completedAt, result, error, statusUrl]
      properties:
        commandId:
          type: string
          format: uuid
        state:
          type: string
          enum: [accepted, dispatched, succeeded, failed, uncertain]
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: [string, "null"]
          format: date-time
        result:
          oneOf:
            - $ref: "#/components/schemas/PalDefenderCommandResult"
            - type: "null"
        error:
          oneOf:
            - $ref: "#/components/schemas/ApiError"
            - type: "null"
        statusUrl:
          type: string
          pattern: "^/api/v1/paldefender-commands/[0-9a-fA-F-]{36}$"
    PalDefenderCommandResult:
      type: object
      additionalProperties: false
      required: [upstreamPath, httpStatus, body, text]
      properties:
        upstreamPath:
          type: string
        httpStatus:
          type: integer
          minimum: 100
          maximum: 599
        body:
          description: Parsed upstream JSON response, or null.
        text:
          type: [string, "null"]
          description: Upstream text response when the response is not JSON.
    PalDefenderCommandAuditEvent:
      type: object
      additionalProperties: false
      required:
        - eventId
        - commandId
        - eventType
        - state
        - at
        - serverId
        - upstreamPath
        - idempotencyKey
        - requestHash
        - reason
        - actor
        - httpStatus
        - errorCode
        - errorMessage
      properties:
        eventId:
          type: string
          format: uuid
        commandId:
          type: string
          format: uuid
        eventType:
          type: string
          enum: [accepted, dispatched, succeeded, failed, uncertain, recovered-uncertain]
        state:
          type: string
          enum: [accepted, dispatched, succeeded, failed, uncertain]
        at:
          type: string
          format: date-time
        serverId:
          type: string
        upstreamPath:
          type: string
        idempotencyKey:
          type: string
          minLength: 8
          maxLength: 128
        requestHash:
          type: string
          pattern: "^[a-f0-9]{64}$"
        reason:
          type: string
          minLength: 3
          maxLength: 500
        actor:
          type: string
        httpStatus:
          type: [integer, "null"]
          minimum: 100
          maximum: 599
        errorCode:
          type: [string, "null"]
        errorMessage:
          type: [string, "null"]
    PalworldServerInfo:
      type: object
      required: [version, serverName, description, worldGuid]
      properties:
        version:
          type: string
        serverName:
          type: string
        description:
          type: string
        worldGuid:
          type: string
    PalworldMetrics:
      type: object
      required:
        - serverFps
        - currentPlayerNum
        - serverFrameTime
        - maxPlayerNum
        - uptime
        - baseCampNum
        - days
      properties:
        serverFps:
          type: integer
        currentPlayerNum:
          type: integer
        serverFrameTime:
          type: number
        maxPlayerNum:
          type: integer
        uptime:
          type: integer
          format: int64
        baseCampNum:
          type: integer
        days:
          type: integer
    NativeBridgeStatus:
      type: object
      required: [serverId, connected, capabilities, probes]
      properties:
        serverId:
          type: string
        connected:
          type: boolean
        protocolVersion:
          type: [string, "null"]
        gameBuild:
          type: [string, "null"]
        modVersion:
          type: [string, "null"]
        capabilities:
          type: array
          items:
            type: string
        probes:
          type: object
          additionalProperties:
            type: boolean
        lastSeenAt:
          type: [string, "null"]
          format: date-time
        lastError:
          type: [string, "null"]
    ServerCapabilities:
      type: object
      required:
        - serverId
        - officialRestConnected
        - publishAnnouncements
        - publishChatAnnouncements
        - publishClientOverlay
        - publishTopBanner
        - sendInGameNotifications
        - commandQueueReady
        - auditReady
        - bridgeConnected
        - readPlayers
        - readPlayerProgression
        - writePlayerProgression
        - readInventory
        - writeInventory
        - readPals
        - writePals
        - mode
        - reasons
      properties:
        serverId:
          type: string
        officialRestConnected:
          type: boolean
        publishAnnouncements:
          type: boolean
          description: True when the durable queue and audit storage are ready and at least one announcement transport is available.
        publishChatAnnouncements:
          type: boolean
          description: True when official REST, the durable queue, and audit storage are ready.
        publishClientOverlay:
          type: boolean
          description: True when the Native Bridge advertises announcements.overlay.write and the durable queue and audit storage are ready.
        publishTopBanner:
          type: boolean
          description: True when the Native Bridge advertises announcements.banner.write, its read-only signature probe succeeds, and the durable queue and audit storage are ready.
        sendInGameNotifications:
          type: boolean
          description: True only when the independent native-notification queue and audit are ready and ui.notifications.probe/write expose a valid server-native preset table.
        commandQueueReady:
          type: boolean
        auditReady:
          type: boolean
        bridgeConnected:
          type: boolean
        readPlayers:
          type: boolean
        readPlayerProgression:
          type: boolean
        writePlayerProgression:
          type: boolean
        readInventory:
          type: boolean
        writeInventory:
          type: boolean
        readPals:
          type: boolean
        writePals:
          type: boolean
        mode:
          type: string
          enum: [normal, read-only-safe-mode, guarded-native-write, maintenance]
        reasons:
          type: array
          items:
            type: string
    ClientOverlayProbe:
      type: object
      description: >-
        Native reflection and compatibility details returned by the loaded mod.
        This read-only probe does not invoke the client-overlay broadcast function.
      additionalProperties: true
    TopBannerProbe:
      type: object
      description: >-
        Native reflection and compatibility details returned by the loaded mod.
        This read-only probe does not invoke the top-banner function.
      additionalProperties: true
    PlayerPage:
