        settledAccounts:
          $ref: "#/components/schemas/EconomyAnalyticsCount"
        quotedRuns:
          type: [integer, "null"]
          format: int64
          minimum: 0
        settledRuns:
          type: [integer, "null"]
          format: int64
          minimum: 0
        uncertainRuns:
          type: [integer, "null"]
          format: int64
          minimum: 0
        settledValue:
          type: [integer, "null"]
          format: int64
          minimum: 0
        conversionRate:
          $ref: "#/components/schemas/EconomyAnalyticsRate"
    EconomyAnalyticsZoneMetric:
      type: object
      additionalProperties: false
