        local:
          type: boolean
        availability:
          type: string
          enum: [available, unavailable, incompatible]
        accountExists:
          type: [boolean, "null"]
        accountDisplayName:
          type: [string, "null"]
        season:
          oneOf:
            - $ref: "#/components/schemas/FederationSeasonProfile"
            - type: "null"
        balances:
          oneOf:
            - $ref: "#/components/schemas/FederationBalanceProfile"
            - type: "null"
        balancesAvailable:
          type: boolean
        compatibility:
          oneOf:
            - $ref: "#/components/schemas/FederationCompatibilityProfile"
            - type: "null"
        switchAvailable:
          type: boolean
        errorCode:
          type: [string, "null"]
        observedAt:
          type: string
          format: date-time
    FederationAccountOverview:
