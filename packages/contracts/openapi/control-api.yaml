        purchase:
          $ref: "#/components/schemas/EconomyCircuitState"
        resourceExchange:
          $ref: "#/components/schemas/EconomyCircuitState"
    EconomyLatencyMetric:
      type: object
      additionalProperties: false
      required: [sampleCount, averageSeconds, maximumSeconds, p95Seconds]
