        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Backups, Commands]
      summary: Create a checksum-verified managed backup
      description: >-
        Saves the world through official REST, waits for a new stable native
        snapshot, copies it outside the active SaveGames tree, writes a SHA-256
        manifest, and verifies the copied files before publication.
      operationId: createManagedBackup
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBackupRequest"
      responses:
        "200":
          description: Idempotent replay of an existing backup command
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveCommand"
        "202":
          description: Backup command durably accepted
          headers:
            Location:
              schema:
                type: string
            Retry-After:
              schema:
                type: integer
                minimum: 0
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveCommand"
        "400":
          description: Invalid label, reason, or idempotency key.
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          $ref: "#/components/responses/Unavailable"
