          type: [number, "null"]
          format: double
          minimum: 0
        worldDistanceToCenter:
          type: [number, "null"]
          format: double
          minimum: 0
        distanceToBoundary:
          type: [number, "null"]
          format: double
          minimum: 0
        worldDistanceToBoundary:
          type: [number, "null"]
          format: double
          minimum: 0
        inside:
          type: [boolean, "null"]
        open:
          type: boolean
          description: Whether the zone accepts new quotes at sampledAt. Closing grace is never included here.
        hotspot:
          type: boolean
          description: Whether this zone is selected by the deterministic business-date hotspot rotation.
        yieldMultiplierBasisPoints:
          type: integer
          minimum: 1000
