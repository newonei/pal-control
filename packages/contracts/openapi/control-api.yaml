      properties:
        zoneId:
          type: string
        accounts:
          $ref: "#/components/schemas/EconomyAnalyticsCount"
        quotedRuns:
          type: [integer, "null"]
          format: int64
          minimum: 0
        settledRuns:
          type: [integer, "null"]
          format: int64
          minimum: 0
        uncertainRuns:
          type: [integer, "null"]
          format: int64
          minimum: 0
        settledValue:
          type: [integer, "null"]
          format: int64
          minimum: 0
        suppressed:
          type: boolean
    EconomyAnalyticsCurrencyHealth:
      type: object
      additionalProperties: false
      required:
        - currency
        - accounts
        - inflow
        - outflow
        - net
        - balanceP50
        - balanceP95
        - minimumBalance
        - maximumBalance
        - suppressed
      properties:
        currency:
          type: string
          enum: [merchantCoin, weeklyTicket]
        accounts:
          $ref: "#/components/schemas/EconomyAnalyticsCount"
        inflow:
          type: [integer, "null"]
          format: int64
          minimum: 0
        outflow:
          type: [integer, "null"]
          format: int64
          minimum: 0
        net:
          type: [integer, "null"]
          format: int64
        balanceP50:
          type: [integer, "null"]
          format: int64
        balanceP95:
          type: [integer, "null"]
          format: int64
        minimumBalance:
          type: [integer, "null"]
          format: int64
        maximumBalance:
          type: [integer, "null"]
          format: int64
        suppressed:
          type: boolean
    EconomyAnalyticsUncertainHealth:
      type: object
      additionalProperties: false
      required: [orders, deliveries, resourceSettlements, suppressed]
      properties:
        orders:
          type: [integer, "null"]
          format: int64
          minimum: 0
        deliveries:
          type: [integer, "null"]
          format: int64
          minimum: 0
        resourceSettlements:
          type: [integer, "null"]
          format: int64
          minimum: 0
        suppressed:
          type: boolean
    EconomyAnalyticsAlert:
      type: object
      additionalProperties: false
      required: [code, severity, message]
      properties:
        code:
          type: string
          pattern: "^[A-Z][A-Z0-9_]+$"
        severity:
          type: string
          enum: [info, warning, critical]
        message:
          type: string
    EconomyAnalyticsPage:
      type: object
      additionalProperties: false
      required: [limit, offset, totalProducts, totalZones, nextCursor]
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 100
        offset:
          type: integer
          minimum: 0
          maximum: 100000
        totalProducts:
          type: integer
          minimum: 0
        totalZones:
          type: integer
          minimum: 0
        nextCursor:
          type: [string, "null"]
          pattern: "^[0-9]+$"
    EconomyAnalyticsReport:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - serverId
        - seasonId
        - contentVersionId
        - window
        - privacy
        - source
        - funnel
        - products
        - resourceExchange
        - zones
        - currencies
        - uncertain
        - alerts
        - page
      properties:
        schemaVersion:
          type: integer
          const: 1
        serverId:
          type: string
          minLength: 1
          maxLength: 64
        seasonId:
          type: [string, "null"]
          format: uuid
        contentVersionId:
          type: [string, "null"]
          format: uuid
        window:
          $ref: "#/components/schemas/EconomyAnalyticsWindow"
        privacy:
          $ref: "#/components/schemas/EconomyAnalyticsPrivacy"
        source:
          $ref: "#/components/schemas/EconomyAnalyticsSource"
        funnel:
          type: array
          minItems: 7
          maxItems: 7
          items:
            $ref: "#/components/schemas/EconomyAnalyticsFunnelStage"
        products:
          type: array
          items:
            $ref: "#/components/schemas/EconomyAnalyticsProductMetric"
        resourceExchange:
          $ref: "#/components/schemas/EconomyAnalyticsExchangeSummary"
        zones:
          type: array
          items:
            $ref: "#/components/schemas/EconomyAnalyticsZoneMetric"
        currencies:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: "#/components/schemas/EconomyAnalyticsCurrencyHealth"
        uncertain:
          $ref: "#/components/schemas/EconomyAnalyticsUncertainHealth"
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/EconomyAnalyticsAlert"
        page:
          $ref: "#/components/schemas/EconomyAnalyticsPage"
    EconomyObservabilityAlert:
      type: object
      additionalProperties: false
      required:
        - code
        - severity
        - active
        - autoCircuit
        - affects
        - value
        - threshold
        - message
      properties:
        code:
          type: string
          pattern: "^[A-Z][A-Z0-9_]+$"
        severity:
          type: string
          enum: [warning, critical]
        active:
          type: boolean
        autoCircuit:
          type: boolean
        affects:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [purchase, resourceExchange]
        value:
          type: [number, "null"]
        threshold:
          type: [number, "null"]
        message:
          type: string
    EconomyCircuitObservability:
      type: object
      additionalProperties: false
      description: Circuit status without the free-text operator reason or identity.
      required: [writesEnabled, updatedAt, source]
      properties:
        writesEnabled:
          type: boolean
        updatedAt:
          type: string
          format: date-time
        source:
          type: string
          enum: [manual, automatic]
    EconomyCircuitsObservability:
      type: object
      additionalProperties: false
      required: [purchase, resourceExchange]
      properties:
        purchase:
          $ref: "#/components/schemas/EconomyCircuitObservability"
        resourceExchange:
          $ref: "#/components/schemas/EconomyCircuitObservability"
    EconomyObservabilitySnapshot:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - status
        - collectedAt
        - gameplayMode
        - orders
        - resourceSettlements
        - deliveries
        - deliveryQueue
        - resourceSettlementQueue
        - outbox
        - uncertain
        - ledger
        - identity
        - dependencyConsistency
        - versionConsistency
        - worldConsistency
        - gameBackup
        - economyBackup
        - circuits
        - alerts
        - collectionErrorCode
      properties:
        schemaVersion:
          type: integer
          const: 1
        status:
          type: string
          enum: [healthy, warning, critical]
        collectedAt:
          type: string
          format: date-time
        gameplayMode:
          type: string
          const: weekly-resource-economy
        orders:
          $ref: "#/components/schemas/EconomyStateMetricMap"
        resourceSettlements:
          $ref: "#/components/schemas/EconomyStateMetricMap"
        deliveries:
          $ref: "#/components/schemas/EconomyStateMetricMap"
        deliveryQueue:
          $ref: "#/components/schemas/EconomyQueueObservability"
        resourceSettlementQueue:
          $ref: "#/components/schemas/EconomyQueueObservability"
        outbox:
          $ref: "#/components/schemas/EconomyQueueObservability"
        uncertain:
          $ref: "#/components/schemas/EconomyUncertainObservability"
        ledger:
          $ref: "#/components/schemas/EconomyInvariantObservability"
        identity:
          $ref: "#/components/schemas/EconomyIdentityObservability"
        dependencyConsistency:
          $ref: "#/components/schemas/EconomyRuntimeDependencyObservability"
        versionConsistency:
          $ref: "#/components/schemas/EconomyConsistencyObservability"
        worldConsistency:
          $ref: "#/components/schemas/EconomyConsistencyObservability"
        gameBackup:
          $ref: "#/components/schemas/EconomyBackupAgeObservability"
        economyBackup:
          $ref: "#/components/schemas/EconomyBackupAgeObservability"
        circuits:
          $ref: "#/components/schemas/EconomyCircuitsObservability"
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/EconomyObservabilityAlert"
        collectionErrorCode:
          type: [string, "null"]
          pattern: "^[A-Z][A-Z0-9_]+$"
    EconomyOperationsAccount:
      type: object
      additionalProperties: false
      required: [accountId, displayName, platform, platformSubjectHash]
      properties:
        accountId:
          type: string
          format: uuid
        displayName:
          type: string
        platform:
          type: string
        platformSubjectHash:
          type: string
          pattern: "^sha256:[0-9a-f]{16}$"
          description: One-way truncated subject fingerprint; never the raw platformSubject.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    EconomyOperationsOrder:
      type: object
      additionalProperties: false
      required:
        - orderId
        - accountId
        - seasonId
        - serverId
        - account
        - deliveryId
        - deliveryAttempt
        - productId
        - sku
        - productName
        - quantity
        - currency
        - totalAmount
        - state
        - outcome
        - receiptResultId
        - contentVersionId
        - contentHash
        - worldId
        - createdAt
        - updatedAt
        - requiresReconciliation
      properties:
        orderId: { type: string, format: uuid }
        accountId: { type: string, format: uuid }
        seasonId: { type: string, format: uuid }
        serverId: { type: string }
        account:
          oneOf:
            - $ref: "#/components/schemas/EconomyOperationsAccount"
            - type: "null"
        deliveryId: { type: string, format: uuid }
        deliveryAttempt: { type: integer, minimum: 0 }
        productId: { type: string, format: uuid }
        sku: { type: string }
        productName: { type: string }
        quantity: { type: integer, minimum: 1 }
        currency:
          $ref: "#/components/schemas/ExtractionCurrency"
        totalAmount: { type: integer, format: int64, minimum: 0 }
        state:
          type: string
          enum: [PendingDelivery, Dispatching, Delivered, DeliveryFailed, DeliveryUncertain, Refunded]
        outcome:
          type: [string, "null"]
          enum: [Succeeded, Failed, Partial, Uncertain, null]
        receiptResultId:
          type: [string, "null"]
          format: uuid
        contentVersionId:
          type: [string, "null"]
          format: uuid
        contentHash:
          type: [string, "null"]
          pattern: "^[0-9a-f]{64}$"
        worldId: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        requiresReconciliation: { type: boolean }
    EconomyOperationsRun:
      type: object
      additionalProperties: false
      required:
        - runId
        - accountId
        - seasonId
        - account
        - zoneId
        - zoneName
        - state
        - itemCount
        - totalValue
        - revision
        - attemptCount
        - errorCode
        - errorMessage
        - contentVersionId
        - contentHash
        - quoteSnapshotHash
        - settlementRequestHash
        - quotedAt
        - expiresAt
        - updatedAt
        - settledAt
        - requiresReconciliation
      properties:
        runId: { type: string, format: uuid }
        accountId: { type: string, format: uuid }
        seasonId: { type: string, format: uuid }
        account:
          oneOf:
            - $ref: "#/components/schemas/EconomyOperationsAccount"
            - type: "null"
        zoneId: { type: string }
        zoneName: { type: string }
        state:
          type: string
          enum: [Quoted, Consuming, Removed, Credited, Settled, Failed, Uncertain, Expired, Cancelled]
        itemCount: { type: integer, minimum: 0 }
        totalValue: { type: integer, format: int64, minimum: 0 }
        revision: { type: integer, format: int64, minimum: 0 }
        attemptCount: { type: integer, minimum: 0 }
        errorCode: { type: [string, "null"] }
        errorMessage: { type: [string, "null"] }
        contentVersionId: { type: [string, "null"], format: uuid }
        contentHash: { type: [string, "null"], pattern: "^[0-9a-f]{64}$" }
        quoteSnapshotHash: { type: string, pattern: "^[0-9a-f]{64}$" }
        settlementRequestHash: { type: [string, "null"], pattern: "^[0-9a-f]{64}$" }
        quotedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        settledAt: { type: [string, "null"], format: date-time }
        requiresReconciliation: { type: boolean }
    EconomyOperationsOverview:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - generatedAt
        - gameplayMode
        - runtime
        - world
        - content
        - gate
        - queues
        - backups
        - alerts
        - accounts
        - orders
        - runs
        - rollover
        - audit
      properties:
        schemaVersion: { type: integer, const: 1 }
        generatedAt: { type: string, format: date-time }
        gameplayMode: { type: string, const: weekly-resource-economy }
        runtime:
          type: object
          additionalProperties: false
          required: [instance, sessions, gc]
          properties:
            instance:
              type: object
              additionalProperties: false
              required:
                - processId
                - processStartedAtUtc
                - dataDirectoryFingerprint
                - logDirectoryFingerprint
              properties:
                processId: { type: integer, minimum: 1 }
                processStartedAtUtc: { type: string, format: date-time }
                dataDirectoryFingerprint: { type: string, pattern: "^[0-9a-f]{64}$" }
                logDirectoryFingerprint: { type: string, pattern: "^[0-9a-f]{64}$" }
            sessions:
              type: object
              additionalProperties: false
              required: [active]
              properties:
                active:
                  type: integer
                  minimum: 0
                  description: Aggregate count after expired process sessions are removed; no session identifier is exposed.
            gc:
              type: object
              additionalProperties: false
              required:
                - heapSizeBytes
                - totalAllocatedBytes
                - gen0Collections
                - gen1Collections
                - gen2Collections
              properties:
                heapSizeBytes: { type: integer, format: int64, minimum: 0 }
                totalAllocatedBytes: { type: integer, format: int64, minimum: 0 }
                gen0Collections: { type: integer, minimum: 0 }
                gen1Collections: { type: integer, minimum: 0 }
                gen2Collections: { type: integer, minimum: 0 }
        world:
          type: object
          additionalProperties: false
          required: [serverId, season, save]
          properties:
            serverId: { type: string }
            season:
              type: [object, "null"]
              additionalProperties: true
            save:
              $ref: "#/components/schemas/SaveStatus"
        content:
          type: [object, "null"]
          additionalProperties: true
        gate:
          type: object
          additionalProperties: true
        queues:
          type: object
          additionalProperties: false
          required: [delivery, settlement, outbox, uncertain]
          properties:
            delivery: { $ref: "#/components/schemas/EconomyQueueObservability" }
            settlement: { $ref: "#/components/schemas/EconomyQueueObservability" }
            outbox: { $ref: "#/components/schemas/EconomyQueueObservability" }
            uncertain: { $ref: "#/components/schemas/EconomyUncertainObservability" }
        backups:
          type: object
          additionalProperties: false
          required: [game, economy]
