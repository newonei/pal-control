openapi: 3.1.0
info:
  title: Pal Control API
  version: 0.4.0
  license:
    name: MIT
    identifier: MIT
  description: >-
    Browser-facing API for Palworld operations. The official Palworld REST API
    and native mod bridge are internal adapters and must not be exposed directly.
    This local profile has no bearer challenge and must remain bound to loopback;
    non-loopback deployments require an authenticated HTTPS reverse proxy.
servers:
  - url: http://127.0.0.1:5180/api/v1
    description: Local development
tags:
  - name: Servers
    description: Server connectivity, health and effective capabilities.
  - name: Configuration
    description: Versioned Palworld server settings with guarded, partial updates.
  - name: Players
    description: Player identity, session and summary data.
  - name: LiveMap
    description: Ephemeral, read-only online player position snapshots and streams.
  - name: Inventory
    description: Versioned inventory reads and guarded transactions.
  - name: Pals
    description: Stable Pal instance reads and low-risk mutations.
  - name: Announcements
    description: Announcement drafts, schedules and publishing.
  - name: InGameNotifications
    description: Fail-closed server-native Palworld notification presets and dispatch commands.
  - name: Saves
    description: Active-world save status and explicit official REST save commands.
  - name: Backups
    description: Read-only native snapshots and checksum-verified managed backups.
  - name: PalDefender
    description: >-
      Allowlisted access to the loopback-only PalDefender REST API. Reads are
      synchronous; writes are durably queued and audited before dispatch.
  - name: Commands
    description: Asynchronous command status and event streaming.
  - name: Extraction
    description: Local extraction-mode economy, shop, delivery, and settlement views.
  - name: ExtractionAdmin
    description: Loopback-only extraction economy administration and weekly rollover controls.
  - name: PlayerPortal
    description: >-
      Public player self-service endpoints. Authenticated player identity is
      derived exclusively from the HttpOnly session cookie; these operations
      never accept a userId override in the query string or business request body.
paths:
  /servers/{serverId}/capabilities:
    get:
      tags: [Servers]
      summary: Get effective server capabilities
      operationId: getServerCapabilities
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Capability snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerCapabilities"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /servers/{serverId}/game-catalog:
    get:
      tags: [Servers]
      summary: Get the searchable Palworld resource catalog
      description: >-
        Returns the bundled, versioned item, Pal, egg and technology reference
        snapshot together with server-verified PalDefender template metadata.
        Template JSON bodies are never exposed. Templates that fail parsing or
        exceed the safety policy remain visible but are marked non-selectable.
      operationId: getGameResourceCatalog
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - name: If-None-Match
          in: header
          description: Exact ETag returned by a previous catalog read.
          schema:
            type: string
      responses:
        "200":
          description: Current resource and template catalog
          headers:
            ETag:
              required: true
              description: Revision token for the bundled snapshot and current template set.
              schema:
                type: string
            Cache-Control:
              required: true
              description: Private five-minute cache policy.
              schema:
                type: string
                const: "private, max-age=300"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameResourceCatalog"
        "304":
          description: The current catalog revision exactly matches If-None-Match.
          headers:
            ETag:
              required: true
              schema:
                type: string
            Cache-Control:
              required: true
              schema:
                type: string
                const: "private, max-age=300"
        "404":
          description: The requested server ID is not configured on this Control API instance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: The bundled game resource catalog is missing, empty, or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /servers/{serverId}/configuration:
    get:
      tags: [Configuration]
      summary: Read every setting in PalWorldSettings.ini
      description: >-
        Returns the complete ordered setting collection together with inferred
        input metadata and default values. Password values are never returned;
        callers only receive whether a sensitive value is currently present.
      operationId: getServerConfiguration
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Current server configuration snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerConfigurationDocument"
        "404":
          description: The requested server ID or configuration file does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: PalWorldSettings.ini is present but structurally invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      tags: [Configuration]
      summary: Apply a guarded partial server configuration update
      description: >-
        Applies only the named changes, preserving the order and spelling of all
        other settings. The revision must match the latest read. A successful
        update is written atomically after creating a timestamped backup.
      operationId: updateServerConfiguration
      parameters:
        - $ref: "#/components/parameters/ServerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerConfigurationUpdate"
      responses:
        "200":
          description: Updated server configuration snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerConfigurationDocument"
        "400":
          description: Unknown setting, invalid value, or malformed update
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ValidationProblemDetails"
        "404":
          description: The requested server ID or configuration file does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: The configuration changed after the supplied revision was read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: PalWorldSettings.ini is present but structurally invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /servers/{serverId}/info:
    get:
      tags: [Servers]
      summary: Get server information through the local official REST adapter
      operationId: getServerInfo
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Server information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PalworldServerInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/metrics:
    get:
      tags: [Servers]
      summary: Get live server metrics through the local official REST adapter
      operationId: getServerMetrics
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Live server metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PalworldMetrics"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/bridge/status:
    get:
      tags: [Servers]
      summary: Get the local Native Mod bridge handshake state
      operationId: getNativeBridgeStatus
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Native bridge status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NativeBridgeStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /servers/{serverId}/players:
    get:
      tags: [Players]
      summary: List players
      operationId: listPlayers
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - name: q
          in: query
          schema:
            type: string
        - name: online
          in: query
          schema:
            type: boolean
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Player page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/live-map:
    get:
      tags: [LiveMap]
      summary: Get the most recent online player position snapshot
      description: >-
        Returns the shared server-side sample. A failed upstream sample never
        replaces the last known player positions with an empty list. Position
        data is ephemeral and is not persisted as player movement history.
      operationId: getLiveMapSnapshot
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - name: If-None-Match
          in: header
          description: ETag returned by the previous snapshot read.
          schema:
            type: string
      responses:
        "200":
          description: Latest complete live-map snapshot
          headers:
            ETag:
              description: Stream and sequence token.
              required: true
              schema:
                type: string
            Cache-Control:
              description: Snapshot cache policy.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveMapSnapshot"
        "304":
          description: The current snapshot matches If-None-Match.
        "401":
          $ref: "#/components/responses/Unauthorized"
  /servers/{serverId}/live-map/events:
    get:
      tags: [LiveMap]
      summary: Subscribe to complete online player position snapshots
      description: >-
        Emits a current complete snapshot immediately and then the newest
        complete snapshot after each upstream sample. Slow consumers may lose
        intermediate samples but always converge on the newest complete state.
      operationId: subscribeLiveMap
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - name: Last-Event-ID
          in: header
          description: Accepted for EventSource reconnection; a full current snapshot is always sent first.
          schema:
            type: string
      responses:
        "200":
          description: >-
            Server-sent event stream. `snapshot` events contain a
            LiveMapSnapshot JSON object and `heartbeat` events contain stream
            liveness metadata.
          headers:
            Cache-Control:
              schema:
                type: string
            X-Accel-Buffering:
              schema:
                type: string
                const: "no"
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          description: The live-map subscriber limit has been reached.
  /servers/{serverId}/players/native-probe:
    get:
      tags: [Players]
      summary: Probe live PalPlayerState objects on the Unreal game thread
      operationId: probeNativePlayers
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Read-only native player object probe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NativePlayerProbe"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/players/native-schema:
    get:
      tags: [Players]
      summary: Read PalPlayerState reflection metadata on the Unreal game thread
      operationId: getNativePlayerSchema
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Filtered reflection metadata without pointers or memory offsets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NativePlayerSchema"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/players/progression/native-schema:
    get:
      tags: [Players]
      summary: Inspect player progression reflection mappings and native function signatures
      operationId: getNativePlayerProgressionSchema
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Read-only progression reflection schema
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/players/progression/native-probe:
    get:
      tags: [Players]
      summary: Read all loaded native player progression snapshots
      operationId: probeNativePlayerProgression
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Loaded player progression snapshots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NativePlayerProgressionProbe"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/players/{playerId}/progression:
    get:
      tags: [Players]
      summary: Read a loaded player's versioned progression snapshot
      operationId: getPlayerProgression
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/PlayerId"
      responses:
        "200":
          description: Player progression snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerProgression"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/players/{playerId}/progression/mutations:
    post:
      tags: [Players]
      summary: Preview or execute one guarded native player progression operation
      operationId: mutatePlayerProgression
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/PlayerId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerProgressionMutationRequest"
      responses:
        "200":
          description: Mutation preview or verified native result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: Invalid or unsupported progression operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/players/{playerId}:
    get:
      tags: [Players]
      summary: Get player details
      operationId: getPlayer
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/PlayerId"
      responses:
        "200":
          description: Player details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          $ref: "#/components/responses/NotFound"
  /servers/{serverId}/players/{playerId}/inventory:
    get:
      tags: [Inventory]
      summary: Read a versioned inventory snapshot
      operationId: getPlayerInventory
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/PlayerId"
      responses:
        "200":
          description: Inventory snapshot
          headers:
            ETag:
              description: Revision token for mutation preconditions
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventorySnapshot"
        "409":
          $ref: "#/components/responses/PlayerOffline"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/inventory/native-schema:
    get:
      tags: [Inventory]
      summary: Read filtered inventory reflection metadata on the Unreal game thread
      operationId: getNativeInventorySchema
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Inventory candidate types and fields without values or offsets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NativeInventorySchema"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/inventory/native-probe:
    get:
      tags: [Inventory]
      summary: Probe player inventory containers and slots on the Unreal game thread
      operationId: probeNativeInventory
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Read-only inventory container probe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NativeInventoryProbe"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/players/{playerId}/inventory/transactions:
    post:
      tags: [Inventory, Commands]
      summary: Preview or submit an inventory transaction
      operationId: createInventoryTransaction
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/PlayerId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryTransactionRequest"
      responses:
        "200":
          description: Dry-run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionPreview"
        "202":
          $ref: "#/components/responses/AcceptedCommand"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/pals/native-schema:
    get:
      tags: [Pals]
      summary: Read filtered Pal reflection metadata on the Unreal game thread
      operationId: getNativePalSchema
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Pal candidate types, properties and functions without offsets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NativePalSchema"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/pals/native-probe:
    get:
      tags: [Pals]
      summary: Probe loaded Pal instances on the Unreal game thread
      operationId: probeNativePals
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Loaded Pal instances with web-safe revision strings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NativePalProbe"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/players/{playerId}/pals:
    get:
      tags: [Pals]
      summary: List stable Pal instances
      operationId: listPlayerPals
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/PlayerId"
        - name: location
          in: query
          schema:
            type: string
            enum: [party, box, base]
      responses:
        "200":
          description: Pal instance page
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor, observedAt]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PalInstance"
                  nextCursor:
                    type: [string, "null"]
                  observedAt:
                    type: string
                    format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/players/{playerId}/pals/{instanceId}/mutations:
    post:
      tags: [Pals, Commands]
      summary: Submit a guarded low-risk Pal mutation
      operationId: mutatePal
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/PlayerId"
        - $ref: "#/components/parameters/InstanceId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PalMutationRequest"
      responses:
        "200":
          description: Dry-run or applied mutation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PalMutationResult"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: Loaded-state, ownership, or supported-field validation failed
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/in-game-notifications/capabilities:
    get:
      tags: [InGameNotifications]
      summary: Probe available server-native in-game notification presets without dispatching
      operationId: getInGameNotificationCapabilities
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Read-only preset, parameter, position, and duration capability table
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InGameNotificationCapabilities"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/in-game-notifications:
    get:
      tags: [InGameNotifications]
      summary: List server-native in-game notification resources
      operationId: listInGameNotifications
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: In-game notification list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/InGameNotification"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [InGameNotifications]
      summary: Create an immutable server-native in-game notification resource
      operationId: createInGameNotification
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InGameNotificationInput"
      responses:
        "200":
          description: Idempotent replay of an existing resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InGameNotification"
        "201":
          description: In-game notification resource created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InGameNotification"
        "400":
          description: Invalid shape or an unsupported custom presentation override
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: Preset, audience, or parameter is unsupported by the live native capability table
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/in-game-notifications/{notificationId}:
    get:
      tags: [InGameNotifications]
      summary: Get one in-game notification resource
      operationId: getInGameNotification
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/NotificationId"
      responses:
        "200":
          description: In-game notification resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InGameNotification"
        "404":
          $ref: "#/components/responses/NotFound"
  /servers/{serverId}/in-game-notifications/{notificationId}/dispatch:
    post:
      tags: [InGameNotifications, Commands]
      summary: Dispatch or schedule a server-native in-game notification
      operationId: dispatchInGameNotification
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/NotificationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Idempotent replay of a completed command
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Command"
        "202":
          description: Native notification command durably accepted
          headers:
            Location:
              schema:
                type: string
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Command"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: Stored preset no longer matches the live native capability table
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/announcements:
    get:
      tags: [Announcements]
      summary: List announcement drafts and history
      operationId: listAnnouncements
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Announcement list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Announcements]
      summary: Create an announcement draft
      operationId: createAnnouncement
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "200":
          description: Idempotent replay of an existing draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
        "201":
          description: Draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
        "400":
          description: Invalid or unsupported announcement input
        "409":
          $ref: "#/components/responses/Conflict"
  /servers/{serverId}/announcements/client-overlay/probe:
