        worldId:
          type: string
          pattern: "^[A-Fa-f0-9]{32}$"
          description: New DedicatedServerName submitted by the guarded rollover script.
    ExtractionRolloverCommitResponse:
      type: object
      additionalProperties: false
      required: [seasonId, seasonCode, worldId, revision]
      properties:
        seasonId:
          type: string
          format: uuid
        seasonCode:
          type: string
        worldId:
          type: string
          pattern: "^[A-F0-9]{32}$"
        revision:
          type: integer
          format: int64
          minimum: 1
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        traceId:
          type: [string, "null"]
