      examples: [steam_76561198000000000]
    PlayerLoginCodeRequest:
      type: object
      additionalProperties: false
      properties:
        userId:
          oneOf:
            - $ref: "#/components/schemas/PlayerPortalUserId"
            - type: "null"
          description: >-
            Required only in TrustedGameCode mode. OpenIdThenGameCode derives the
            subject from the pending HttpOnly Steam identity cookie.
    PlayerAuthenticationMode:
      type: object
      additionalProperties: false
      required:
        - authenticationMode
        - steamOpenIdRequired
        - pendingPlatformIdentity
        - trustedGameCodeFallback
      properties:
        authenticationMode:
          type: string
          enum: [trustedGameCode, openIdThenGameCode]
        steamOpenIdRequired:
          type: boolean
        pendingPlatformIdentity:
          type: boolean
        trustedGameCodeFallback:
          type: boolean
    PlayerLoginChallenge:
      type: object
      additionalProperties: false
      required: [challengeId, expiresAt, retryAfterSeconds, delivery]
      properties:
        challengeId:
          type: string
          description: Opaque identifier for the single-use login challenge.
          pattern: "^[A-Za-z0-9_-]{43}$"
        expiresAt:
          type: string
          format: date-time
        retryAfterSeconds:
          type: integer
          minimum: 1
        delivery:
          type: string
          const: in-game
    PlayerLoginCodeVerification:
      type: object
      additionalProperties: false
      required: [challengeId, code]
      properties:
        challengeId:
          type: string
          pattern: "^[A-Za-z0-9_-]{43}$"
        code:
          type: string
          description: Eight-digit one-time code delivered privately in game.
          pattern: "^[0-9]{8}$"
    PlayerPortalSession:
      type: object
      additionalProperties: false
      required: [authenticated, userId, displayName, csrfToken, expiresAt]
      properties:
        authenticated:
          type: boolean
          const: true
        userId:
          $ref: "#/components/schemas/PlayerPortalUserId"
        displayName:
          type: [string, "null"]
          description: Reserved for a resolved in-game display name; currently null.
        csrfToken:
          type: string
          description: Send as X-CSRF-Token on authenticated player-portal writes.
          pattern: "^[A-Za-z0-9_-]{43}$"
        expiresAt:
          type: string
          format: date-time
    CreatePlayerPortalOrderRequest:
      type: object
      additionalProperties: false
      required: [productId, quantity, sku, contentVersionId, contentHash]
      description: >-
        Contains no player identity. The target account is always selected from
        the authenticated HttpOnly player session cookie. SKU, immutable content
        version and content hash must be copied from the same current catalog item;
        stale or mixed evidence is rejected before debit or delivery.
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
          maximum: 99
        sku:
          type: string
          minLength: 1
          maxLength: 128
        contentVersionId:
          type: string
          format: uuid
        contentHash:
          type: string
          pattern: "^[a-f0-9]{64}$"
