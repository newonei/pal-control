        - $ref: "#/components/parameters/AdminReason"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [sourceSeasonId, rulesVersion, rewardBatchKey, grants]
              properties:
                sourceSeasonId:
                  type: string
                  format: uuid
                rulesVersion:
                  type: string
                  minLength: 1
                  maxLength: 128
                rewardBatchKey:
                  type: string
                  minLength: 1
                  maxLength: 64
                grants:
                  type: array
                  maxItems: 100000
                  items:
                    $ref: "#/components/schemas/SeasonRewardGrant"
      responses:
        "200":
          description: Frozen reward job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeasonSettlementJob"
        default:
          $ref: "#/components/responses/ExtractionError"
  /admin/season-settlement-jobs/{jobId}:
    get:
      tags: [ExtractionAdmin]
      summary: Inspect one season settlement job and its frozen items
      operationId: getSeasonSettlementJob
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Current job projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeasonSettlementJob"
        "404":
          $ref: "#/components/responses/NotFound"
  /admin/season-settlement-jobs/{jobId}/run:
    post:
      tags: [ExtractionAdmin]
      summary: Resume a frozen season job under maintenance using ledger idempotency
      operationId: runSeasonSettlementJob
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/AdminTotp"
        - $ref: "#/components/parameters/AdminReason"
      responses:
        "200":
          description: Running or completed job projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeasonSettlementJob"
        default:
          $ref: "#/components/responses/ExtractionError"
  /internal/federation/profile:
    post:
      tags: [Federation]
      summary: Resolve one irreversible federation subject on the local node
      description: >-
        Server-to-server read only. Protocol v2 binds a pair-specific HMAC subject
        to the authenticated caller, this exact target node, a versioned identity
        key, the request body hash, timestamp, and one-time nonce. The request never
        contains a SteamID, PlayerUID, accountId, cookie, or user-selected URL. The
        response reads the local authoritative account, active week, and wallet
        without creating an account, seeding currency, or mutating an index.
      operationId: getInternalFederationProfile
      security:
        - federationRequestSignature: []
      parameters:
        - $ref: "#/components/parameters/FederationProtocolVersion"
        - $ref: "#/components/parameters/FederationCaller"
        - $ref: "#/components/parameters/FederationTarget"
        - $ref: "#/components/parameters/FederationSigningKeyId"
        - $ref: "#/components/parameters/FederationIdentityKeyId"
        - $ref: "#/components/parameters/FederationExpectedCombination"
        - $ref: "#/components/parameters/FederationTimestamp"
        - $ref: "#/components/parameters/FederationNonce"
        - $ref: "#/components/parameters/FederationContentSha256"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FederationProfileRequest"
      responses:
        "200":
          description: Local self-only profile projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FederationLocalProfile"
        "400":
          $ref: "#/components/responses/FederationError"
        "401":
          $ref: "#/components/responses/FederationError"
        "413":
          $ref: "#/components/responses/FederationError"
        "429":
          $ref: "#/components/responses/FederationError"
        default:
          $ref: "#/components/responses/FederationError"
  /internal/federation/health:
    get:
      tags: [Federation]
      summary: Read this node's registered compatibility identity
      operationId: getInternalFederationHealth
      security:
        - federationRequestSignature: []
      parameters:
        - $ref: "#/components/parameters/FederationProtocolVersion"
        - $ref: "#/components/parameters/FederationCaller"
        - $ref: "#/components/parameters/FederationTarget"
        - $ref: "#/components/parameters/FederationSigningKeyId"
        - $ref: "#/components/parameters/FederationIdentityKeyId"
        - $ref: "#/components/parameters/FederationExpectedCombination"
        - $ref: "#/components/parameters/FederationTimestamp"
        - $ref: "#/components/parameters/FederationNonce"
        - $ref: "#/components/parameters/FederationContentSha256"
      responses:
        "200":
          description: Node health and compatibility evidence pointer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FederationNodeHealth"
        "401":
          $ref: "#/components/responses/FederationError"
        "429":
          $ref: "#/components/responses/FederationError"
        default:
          $ref: "#/components/responses/FederationError"
  /player/me/federation:
    get:
      tags: [Federation, PlayerPortal]
      summary: Read the authenticated player's account summary across allowlisted servers
      description: >-
        Identity is derived only from the HttpOnly player session. Query, body,
        and identity headers are rejected. Each failed or incompatible node is
        explicitly unavailable rather than being represented as a zero balance.
        Portal switch URLs come only from operator configuration and no session
        or federation token is appended or forwarded to another origin.
      operationId: getPlayerFederationOverview
      security:
        - playerSessionCookie: []
      responses:
        "200":
          description: Per-node read-only account, season, and wallet summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FederationAccountOverview"
        "400":
          $ref: "#/components/responses/PlayerPortalError"
        "401":
          $ref: "#/components/responses/PlayerPortalError"
        default:
          $ref: "#/components/responses/PlayerPortalError"
  /admin/federation/health:
    get:
      tags: [Federation]
      summary: Probe the allowlisted federation nodes without reading a player
      operationId: getFederationHealth
      responses:
        "200":
          description: Explicit health result for every configured node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FederationHealthResponse"
        default:
          $ref: "#/components/responses/FederationError"
  /admin/federation/compatibility-matrix:
    get:
      tags: [Federation]
      summary: Read the canonical versioned compatibility matrix
      operationId: getFederationCompatibilityMatrix
      responses:
        "200":
          description: Canonical matrix digest, combinations, evidence, and configured servers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FederationCompatibilityMatrix"
        default:
          $ref: "#/components/responses/FederationError"
components:
  securitySchemes:
    adminApiKey:
      type: apiKey
      in: header
      name: X-Pal-Admin-Key
      description: >-
        Administrator API key. Configure only a SHA-256 digest at rest; never
        store the plaintext key in repository configuration or logs.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    playerSessionCookie:
      type: apiKey
      in: cookie
      name: pal_player_session
      description: >-
        Opaque player session set only after successful in-game OTP verification.
        The deployment uses an HttpOnly, SameSite=Strict cookie scoped to
        /api/v1/player and enables Secure behind HTTPS. Authenticated player
        identity is derived exclusively from this cookie, never from a userId
        query parameter or business request body.
    federationRequestSignature:
      type: apiKey
      in: header
      name: X-Pal-Control-Signature
      description: >-
        HMAC-SHA-256 signature made with the selected non-revoked per-peer signing
        key. Its canonical input includes protocol, HTTP method/path, caller, target,
        signing/identity key ids, expected compatibility combination, timestamp,
        nonce, and the exact request-body SHA-256. Companion X-Pal-Control-* headers
        below are mandatory. Secrets and signatures are never returned or audited.
  parameters:
    FederationProtocolVersion:
      name: X-Pal-Control-Federation-Version
      in: header
      required: true
      schema:
        type: integer
        enum: [2]
    FederationCaller:
      name: X-Pal-Control-Caller
      in: header
      required: true
      schema:
        type: string
        pattern: "^[a-z][a-z0-9-]{1,31}$"
    FederationTarget:
      name: X-Pal-Control-Target
      in: header
      required: true
      schema:
        type: string
        pattern: "^[a-z][a-z0-9-]{1,31}$"
    FederationSigningKeyId:
      name: X-Pal-Control-Signing-Key-Id
      in: header
      required: true
      schema:
        type: string
        pattern: "^[a-z][a-z0-9-]{2,47}$"
    FederationIdentityKeyId:
      name: X-Pal-Control-Identity-Key-Id
      in: header
      required: true
      description: Versioned identity key id for profile requests; '-' for health.
      schema:
        type: string
        pattern: "^(-|[a-z][a-z0-9-]{2,47})$"
    FederationExpectedCombination:
      name: X-Pal-Control-Expected-Combination
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 160
    FederationTimestamp:
      name: X-Pal-Control-Timestamp
      in: header
      required: true
      schema:
        type: integer
        format: int64
    FederationNonce:
      name: X-Pal-Control-Nonce
      in: header
      required: true
      schema:
        type: string
        pattern: "^[A-Za-z0-9_-]{22}$"
    FederationContentSha256:
      name: X-Pal-Control-Content-SHA256
      in: header
      required: true
      schema:
        type: string
        pattern: "^[a-f0-9]{64}$"
    AdminTotp:
      name: X-Pal-Admin-Totp
      in: header
      required: true
      description: Six-digit RFC 6238 TOTP code required for privileged writes.
      schema:
        type: string
        pattern: "^[0-9]{6}$"
    AdminReason:
      name: X-Pal-Admin-Reason
      in: header
      required: true
      description: Human-entered audit reason for the privileged operation.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    ServerId:
      name: serverId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    EconomyContentDraftId:
      name: draftId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EconomyContentRevision:
      name: If-Match
      in: header
      required: true
      description: Current non-negative numeric draft revision, optionally quoted.
      schema:
        type: string
        pattern: '^"?[0-9]+"?$'
    PlayerId:
      name: playerId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    InstanceId:
      name: instanceId
      in: path
      required: true
      description: Stable Pal instance identifier, never a list index
      schema:
        type: string
        minLength: 1
    NotificationId:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BackupId:
      name: backupId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: "^[A-Za-z0-9][A-Za-z0-9._-]*$"
    SaveCommandId:
      name: commandId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    NewPlayerActivityKey:
      name: activityKey
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/NewPlayerActivityKey"
    NewPlayerActivityVersion:
      name: version
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
        maximum: 1000000
    PlayerPortalOrigin:
      name: Origin
      in: header
      required: true
      description: >-
        Every player-portal POST requires exactly one Origin value that exactly
        matches an explicitly configured PlayerPortal allowed origin.
      schema:
        type: string
        format: uri
    PlayerPortalCsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      description: >-
        Per-session token returned by OTP verification or the session read. It is
        required in addition to the HttpOnly session cookie on authenticated writes.
      schema:
        type: string
        pattern: "^[A-Za-z0-9_-]{43}$"
    ExtractionUserId:
      name: userId
      in: query
      required: true
      description: Normalized cross-season platform UserId, never a display name or PlayerUID.
      schema:
        $ref: "#/components/schemas/ExtractionUserId"
    ExtractionRunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PalDefenderPlayerIdentifier:
      name: playerIdentifier
      in: path
      required: true
      description: PalDefender accepts a supported player name, UserId, or platform identifier.
      schema:
        type: string
        minLength: 1
        maxLength: 160
    PalDefenderGuildId:
      name: guildId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 160
    PalDefenderBaseCampId:
      name: baseCampId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PalDefenderUserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 160
    PalDefenderIp:
      name: ip
      in: path
      required: true
      description: A syntactically valid IPv4 or IPv6 address.
      schema:
        type: string
        minLength: 2
        maxLength: 45
    PalDefenderCommandId:
      name: commandId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: ETag returned by the last read
      schema:
        type: string
  responses:
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Forbidden:
      description: Authenticated principal does not have the required role or security proof
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ApiError"
    AcceptedCommand:
      description: Command accepted for asynchronous processing
      headers:
        Location:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AcceptedCommand"
    Conflict:
      description: Player session, Pal state, or idempotency conflict
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ApiError"
    PreconditionFailed:
      description: Revision mismatch; re-read and review the diff
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ApiError"
    PlayerOffline:
      description: Live editing is restricted to an online player
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unavailable:
      description: Required Palworld adapter is unavailable or in safe mode
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    PalDefenderUpstreamResponse:
      description: >-
        PalDefender upstream status, JSON, or text passed through synchronously.
        The Control API never exposes the upstream bearer token.
      content:
        application/json:
          schema: {}
        text/plain:
          schema:
            type: string
    PalDefenderUnavailable:
      description: PalDefender is disabled, timed out, or unavailable before a read completed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PalDefenderTransportError"
    PalDefenderCommandAccepted:
      description: PalDefender command durably accepted or still in progress
      headers:
        Location:
          description: Command status URL.
          schema: { type: string }
        Retry-After:
          description: Suggested status polling delay in seconds.
          schema: { type: integer, minimum: 0 }
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PalDefenderCommand"
    PalDefenderCommandComplete:
      description: Idempotent replay of a command that already reached a terminal state
      headers:
        Location:
          description: Command status URL.
          schema: { type: string }
        Retry-After:
          description: Suggested status polling delay in seconds.
          schema: { type: integer, minimum: 0 }
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PalDefenderCommand"
    PalDefenderBadRequest:
      description: >-
        Invalid path value, Idempotency-Key, reason, command envelope, IP address,
        base camp ID, or payload larger than 64 KiB.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    PalDefenderQueueUnavailable:
      description: Durable PalDefender queue or audit persistence is unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    ExtractionError:
      description: Extraction-mode validation, state, persistence, or adapter error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    PlayerPortalError:
      description: >-
        Player authentication, Origin, CSRF, session, validation, economy state,
        persistence, delivery, or traffic-boundary error. Authentication failures
        use HTTP 401, Origin and CSRF failures use HTTP 403, request bodies over
        16 KiB use HTTP 413, and login or per-IP traffic throttling uses HTTP 429.
      headers:
        Retry-After:
          description: Present on login cooldowns and player-portal traffic throttling.
          schema:
            type: integer
            minimum: 1
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    FederationError:
      description: >-
        Federation authentication, request-boundary, compatibility, timeout,
        response-size, or per-node availability error. A failed node is never
        represented as an authoritative zero balance.
      headers:
        Retry-After:
          description: Present when the bounded internal read rate is exceeded.
          schema:
            type: integer
            minimum: 1
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    EconomyContentError:
      description: >-
        Economy-content authorization, validation, optimistic-concurrency,
        publication, rollback, maintenance-drain, or persistence error.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/ApiError"
              - $ref: "#/components/schemas/EconomyContentValidationFailure"
  requestBodies:
    PalDefenderCommand:
      required: true
      description: >-
        Durable command envelope. payload is forwarded to the selected PalDefender
        endpoint only after the accepted event is flushed to disk. Its compact
        UTF-8 JSON representation must not exceed 64 KiB.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PalDefenderCommandRequest"
  schemas:
    AdminSession:
      type: object
      additionalProperties: false
      required: [subject, roles, authenticationMethod]
      properties:
        subject:
          type: string
          minLength: 1
        roles:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [Viewer, Operator, EconomyAdmin, SeasonAdmin, Owner]
        authenticationMethod:
          type: string
          enum: [api_key, development_loopback]
    AdminAuditEvent:
      type: object
      additionalProperties: false
      required:
        - auditId
        - correlationId
        - phase
        - subject
        - roles
        - sourceIp
        - method
        - path
        - requestHash
        - serviceVersion
        - occurredAt
      properties:
        auditId:
          type: string
          format: uuid
        correlationId:
          type: string
          format: uuid
        phase:
          type: string
          enum: [started, completed, failed]
        subject:
          type: string
        roles:
          type: array
          items:
            type: string
        sourceIp:
          type: string
        method:
          type: string
        path:
          type: string
        requestHash:
          type: string
          pattern: "^[0-9a-f]{64}$"
        reason:
          type: [string, "null"]
        beforeJson:
          type: [string, "null"]
        afterJson:
          type: [string, "null"]
        serviceVersion:
          type: string
        resultStatus:
          type: [integer, "null"]
        occurredAt:
          type: string
          format: date-time
    AdminAuditList:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminAuditEvent"
    PlayerIdentitySecurityAuditEvent:
      type: object
      additionalProperties: false
      required:
        - sequence
        - eventId
        - correlationId
        - eventType
        - outcome
        - reasonCode
        - riskLevel
        - subjectFingerprint
        - sourceIpFingerprint
        - affectedSessions
        - occurredAt
      properties:
        sequence:
          type: integer
          format: int64
          minimum: 1
        eventId:
          type: string
          format: uuid
        correlationId:
          type: string
          minLength: 1
        eventType:
          type: string
          enum:
            - login_code_request
            - login_code_verification
            - session_rejected
            - session_logout
            - administrative_session_revocation
            - administrative_ban
            - administrative_unban
        outcome:
          type: string
          enum: [succeeded, denied, failed, ignored]
        reasonCode:
          type: string
          pattern: "^[a-z0-9_-]{1,64}$"
        riskLevel:
          type: string
          enum: [normal, suspicious, high]
        subjectFingerprint:
          type: [string, "null"]
          pattern: "^[0-9A-F]{64}$"
        sourceIpFingerprint:
          type: [string, "null"]
          pattern: "^[0-9A-F]{64}$"
        affectedSessions:
          type: integer
          minimum: 0
        occurredAt:
          type: string
          format: date-time
    PlayerIdentitySecurityAuditList:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PlayerIdentitySecurityAuditEvent"
    ServerConfigurationDocument:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - revision
        - options
        - filePath
        - defaultFilePath
        - lastModifiedAt
      properties:
        schemaVersion:
          type: integer
          const: 2
        revision:
          type: string
          minLength: 1
          description: Opaque content revision required by the next update.
        options:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ServerConfigurationOption"
        filePath:
          type: string
          minLength: 1
        defaultFilePath:
          type: string
          minLength: 1
        lastModifiedAt:
          type: string
          format: date-time
    ServerConfigurationOption:
      type: object
      additionalProperties: false
      required:
        - key
        - kind
        - value
        - defaultValue
        - sensitive
        - hasValue
        - allowedValues
        - minimum
        - maximum
        - step
        - customized
      properties:
        key:
          type: string
          minLength: 1
        kind:
          type: string
          enum: [boolean, integer, number, string, enum, string-list]
          description: Inferred UI value kind.
        value:
          $ref: "#/components/schemas/ServerConfigurationValue"
        defaultValue:
          $ref: "#/components/schemas/ServerConfigurationValue"
        sensitive:
          type: boolean
        hasValue:
          type: boolean
          description: Indicates whether a sensitive setting is configured without exposing it.
        allowedValues:
          oneOf:
            - type: array
              items:
                type: string
            - type: "null"
        minimum:
          oneOf:
            - type: number
            - type: "null"
        maximum:
          oneOf:
            - type: number
            - type: "null"
        step:
          oneOf:
            - type: number
              exclusiveMinimum: 0
            - type: "null"
        customized:
          type: boolean
          description: True when the current serialized value differs from the bundled default.
    ServerConfigurationUpdate:
      type: object
      additionalProperties: false
      required: [revision, changes]
      properties:
        revision:
          type: string
          minLength: 1
        changes:
          type: object
          maxProperties: 256
          description: Only settings explicitly changed by the operator.
          additionalProperties:
            $ref: "#/components/schemas/ServerConfigurationChangeValue"
    ServerConfigurationValue:
      oneOf:
        - type: boolean
        - type: number
        - type: string
        - type: array
          items:
            type: string
        - type: "null"
    ServerConfigurationChangeValue:
      description: >-
        A string, number, boolean, or string list. Null explicitly clears a
        sensitive setting and is rejected for non-sensitive settings.
      oneOf:
        - type: boolean
        - type: number
        - type: string
        - type: array
          items:
            type: string
        - type: "null"
    ValidationProblemDetails:
      type: object
      required: [title, status, errors]
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
          const: 400
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        traceId:
          type: string
    GameResourceCatalog:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - revision
        - generatedAt
        - source
        - coverage
        - items
        - pals
        - eggs
        - technologies
        - templates
      properties:
        schemaVersion:
          type: string
          const: "1"
        revision:
          type: string
          minLength: 18
          description: >-
            Bundled snapshot revision suffixed with a 16-character SHA-256
            digest of the current server template filenames and file hashes.
        generatedAt:
          type: string
          format: date-time
        source:
          $ref: "#/components/schemas/GameCatalogSource"
        coverage:
          $ref: "#/components/schemas/GameCatalogCoverage"
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/GameCatalogEntry"
        pals:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/GameCatalogEntry"
        eggs:
          type: array
          items:
            $ref: "#/components/schemas/GameCatalogEntry"
        technologies:
          type: array
          items:
            $ref: "#/components/schemas/GameCatalogEntry"
        templates:
          type: array
          description: >-
            Metadata for top-level JSON files in PalDefender/Pals/Templates.
            The template contents are intentionally omitted.
          items:
            $ref: "#/components/schemas/PalTemplateCatalogEntry"
    GameCatalogSource:
      type: object
      additionalProperties: false
      required: [name, note, itemsUrl, palsUrl, technologiesUrl, palNamesUrl, palNamesLicense]
      properties:
        name:
          type: string
          minLength: 1
        note:
          type: string
          minLength: 1
        itemsUrl:
          type: string
          format: uri
        palsUrl:
          type: string
          format: uri
        technologiesUrl:
          type: string
          format: uri
        palNamesUrl:
          type: string
          format: uri
          description: Versioned source of Simplified Chinese Pal display names.
        palNamesLicense:
          type: string
          const: MIT
    GameCatalogCoverage:
      type: object
      additionalProperties: false
      required: [items, pals, eggs, technologies, templates]
      properties:
        items:
          type: string
          const: reference
        pals:
          type: string
          const: reference-zh-Hans
        eggs:
          type: string
          const: paldefender-documented
        technologies:
          type: string
          const: reference
        templates:
          type: string
          const: server-verified
    GameCatalogEntry:
      type: object
      additionalProperties: false
      required: [id, name, category, dex]
      properties:
        id:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        englishName:
          type: [string, "null"]
          description: English display name when the primary name is localized; null when unavailable.
        category:
          type: string
          minLength: 1
        dex:
          type: [string, "null"]
          description: Paldeck dex key for Pal entries; null for other resource types.
    PalTemplateCatalogEntry:
      type: object
      additionalProperties: false
      required:
        - fileName
        - palId
        - nickname
        - level
        - shiny
        - passiveCount
        - activeSkillCount
        - sizeBytes
        - lastModifiedAt
        - sha256
        - parseable
        - selectable
        - riskLevel
        - summary
      properties:
        fileName:
          type: string
          minLength: 1
          description: Basename only; paths and template JSON are not returned.
        palId:
          type: [string, "null"]
        nickname:
          type: [string, "null"]
        level:
          type: [integer, "null"]
          format: int32
        shiny:
          type: [boolean, "null"]
        passiveCount:
          type: integer
          format: int32
          minimum: 0
        activeSkillCount:
          type: integer
          format: int32
          minimum: 0
        sizeBytes:
          type: integer
          format: int64
          minimum: 0
        lastModifiedAt:
          type: string
          format: date-time
        sha256:
          type: string
          pattern: "^$|^[0-9a-f]{64}$"
          description: Empty only when the template could not safely be read or hashed.
        parseable:
          type: boolean
        selectable:
          type: boolean
        riskLevel:
          type: string
          enum: [standard, elevated, high, invalid]
        summary:
          type: string
          minLength: 1
    PalDefenderCommandRequest:
      type: object
      additionalProperties: false
      required: [reason, payload]
      properties:
        reason:
          type: string
          minLength: 3
          maxLength: 500
          description: Human review and audit reason; control characters are rejected.
        payload:
          description: >-
            Exact JSON payload for the selected PalDefender POST endpoint. Use
            null for an upstream endpoint that takes no body.
    PalDefenderCatalog:
      type: object
      additionalProperties: false
      required: [basePath, count, items]
      properties:
        basePath:
          type: string
          pattern: "^/api/v1/servers/[^/]+/paldefender$"
        count:
          type: integer
          const: 27
        items:
          type: array
          minItems: 27
          maxItems: 27
          items:
            $ref: "#/components/schemas/PalDefenderCatalogEntry"
    PalDefenderCatalogEntry:
      type: object
      additionalProperties: false
      required: [method, path, permission, description]
      properties:
        method:
          type: string
          enum: [GET, POST]
        path:
          type: string
        permission:
          type: string
        description:
          type: string
    PalDefenderStatus:
      type: object
      additionalProperties: false
      required: [enabled, connected, baseUrl, version, error]
      properties:
        enabled:
          type: boolean
        connected:
          type: boolean
        baseUrl:
          type: string
          format: uri
          description: Must resolve to a loopback HTTP URL ending in a slash.
        version:
          description: Exact JSON returned by PalDefender GET /version, or null.
        upstreamStatus:
          type: [integer, "null"]
          minimum: 100
          maximum: 599
        error:
          description: >-
            Adapter-neutral failure using SETTLEMENT_PROBE_FAILED or
            SETTLEMENT_PROBE_UNCERTAIN; transport secrets and raw commands are
            never returned.
          oneOf:
            - $ref: "#/components/schemas/ApiError"
            - type: "null"
    PalDefenderTransportError:
      type: object
      additionalProperties: false
      required: [error, outcomeUncertain]
      properties:
        error:
          $ref: "#/components/schemas/ApiError"
        outcomeUncertain:
          type: boolean
          description: False for synchronous GET operations.
    PalDefenderCommand:
      type: object
      additionalProperties: false
      required: [commandId, state, createdAt, completedAt, result, error, statusUrl]
      properties:
        commandId:
          type: string
          format: uuid
        state:
          type: string
          enum: [accepted, dispatched, succeeded, failed, uncertain]
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: [string, "null"]
          format: date-time
        result:
          oneOf:
            - $ref: "#/components/schemas/PalDefenderCommandResult"
            - type: "null"
        error:
          oneOf:
            - $ref: "#/components/schemas/ApiError"
            - type: "null"
        statusUrl:
          type: string
          pattern: "^/api/v1/paldefender-commands/[0-9a-fA-F-]{36}$"
    PalDefenderCommandResult:
      type: object
      additionalProperties: false
      required: [upstreamPath, httpStatus, body, text]
      properties:
        upstreamPath:
          type: string
        httpStatus:
          type: integer
          minimum: 100
          maximum: 599
        body:
          description: Parsed upstream JSON response, or null.
        text:
          type: [string, "null"]
          description: Upstream text response when the response is not JSON.
    PalDefenderCommandAuditEvent:
      type: object
      additionalProperties: false
      required:
        - eventId
        - commandId
        - eventType
        - state
        - at
        - serverId
        - upstreamPath
        - idempotencyKey
        - requestHash
        - reason
        - actor
        - httpStatus
        - errorCode
        - errorMessage
      properties:
        eventId:
          type: string
          format: uuid
        commandId:
          type: string
          format: uuid
        eventType:
          type: string
          enum: [accepted, dispatched, succeeded, failed, uncertain, recovered-uncertain]
        state:
          type: string
          enum: [accepted, dispatched, succeeded, failed, uncertain]
        at:
          type: string
          format: date-time
        serverId:
          type: string
        upstreamPath:
          type: string
        idempotencyKey:
          type: string
          minLength: 8
          maxLength: 128
        requestHash:
          type: string
          pattern: "^[a-f0-9]{64}$"
        reason:
          type: string
          minLength: 3
          maxLength: 500
        actor:
          type: string
        httpStatus:
          type: [integer, "null"]
          minimum: 100
          maximum: 599
        errorCode:
          type: [string, "null"]
        errorMessage:
          type: [string, "null"]
    PalworldServerInfo:
      type: object
      required: [version, serverName, description, worldGuid]
      properties:
        version:
          type: string
        serverName:
          type: string
        description:
          type: string
        worldGuid:
          type: string
    PalworldMetrics:
      type: object
      required:
        - serverFps
        - currentPlayerNum
        - serverFrameTime
        - maxPlayerNum
        - uptime
        - baseCampNum
        - days
      properties:
        serverFps:
          type: integer
        currentPlayerNum:
          type: integer
        serverFrameTime:
          type: number
        maxPlayerNum:
          type: integer
        uptime:
          type: integer
          format: int64
        baseCampNum:
          type: integer
        days:
          type: integer
    NativeBridgeStatus:
      type: object
      required:
        - serverId
        - connected
        - protocolVersion
        - gameBuild
        - steamBuild
        - modVersion
        - runtimeExecutableSha256
        - runtimeExecutableSize
        - runtimeNativeDllSha256
        - runtimeNativeDllSize
        - runtimeUe4ssDllSha256
        - runtimeUe4ssDllSize
        - runtimeIdentityVerified
        - writeEnabled
        - capabilities
        - probes
      properties:
        serverId:
          type: string
        connected:
          type: boolean
        protocolVersion:
          type: [string, "null"]
        gameBuild:
          type: [string, "null"]
        steamBuild:
          type: [string, "null"]
        modVersion:
          type: [string, "null"]
        runtimeExecutableSha256:
          type: [string, "null"]
          pattern: "^[a-f0-9]{64}$"
        runtimeExecutableSize:
          type: [integer, "null"]
          format: int64
          minimum: 1
        runtimeNativeDllSha256:
          type: [string, "null"]
          pattern: "^[a-f0-9]{64}$"
        runtimeNativeDllSize:
          type: [integer, "null"]
          format: int64
          minimum: 1
        runtimeUe4ssDllSha256:
          type: [string, "null"]
          pattern: "^[a-f0-9]{64}$"
        runtimeUe4ssDllSize:
          type: [integer, "null"]
          format: int64
          minimum: 1
        runtimeIdentityVerified:
          type: boolean
        writeEnabled:
          type: boolean
        capabilities:
          type: array
          items:
            type: string
        probes:
          type: object
          additionalProperties:
            type: boolean
        lastSeenAt:
          type: [string, "null"]
          format: date-time
        lastError:
          type: [string, "null"]
    ServerCapabilities:
      type: object
      required:
        - serverId
        - officialRestConnected
        - publishAnnouncements
        - publishChatAnnouncements
        - publishClientOverlay
        - publishTopBanner
        - sendInGameNotifications
        - commandQueueReady
        - auditReady
        - bridgeConnected
        - readPlayers
        - readPlayerProgression
        - writePlayerProgression
        - readInventory
        - writeInventory
        - readPals
        - writePals
        - mode
        - reasons
      properties:
        serverId:
          type: string
        officialRestConnected:
          type: boolean
        publishAnnouncements:
          type: boolean
          description: True when the durable queue and audit storage are ready and at least one announcement transport is available.
        publishChatAnnouncements:
          type: boolean
          description: True when official REST, the durable queue, and audit storage are ready.
        publishClientOverlay:
          type: boolean
          description: True when the Native Bridge advertises announcements.overlay.write and the durable queue and audit storage are ready.
        publishTopBanner:
          type: boolean
          description: True when the Native Bridge advertises announcements.banner.write, its read-only signature probe succeeds, and the durable queue and audit storage are ready.
        sendInGameNotifications:
          type: boolean
          description: True only when the independent native-notification queue and audit are ready and ui.notifications.probe/write expose a valid server-native preset table.
        commandQueueReady:
          type: boolean
        auditReady:
          type: boolean
        bridgeConnected:
          type: boolean
        readPlayers:
          type: boolean
        readPlayerProgression:
          type: boolean
        writePlayerProgression:
          type: boolean
        readInventory:
          type: boolean
        writeInventory:
          type: boolean
        readPals:
          type: boolean
        writePals:
          type: boolean
        mode:
          type: string
          enum: [normal, read-only-safe-mode, guarded-native-write, maintenance]
        reasons:
          type: array
          items:
            type: string
    ClientOverlayProbe:
      type: object
      description: >-
        Native reflection and compatibility details returned by the loaded mod.
        This read-only probe does not invoke the client-overlay broadcast function.
      additionalProperties: true
    TopBannerProbe:
      type: object
      description: >-
        Native reflection and compatibility details returned by the loaded mod.
        This read-only probe does not invoke the top-banner function.
      additionalProperties: true
