            - catalog-viewed
            - order-created
            - order-delivered
            - resource-quoted
            - resource-settled
        label:
          type: string
        accounts:
          $ref: "#/components/schemas/EconomyAnalyticsCount"
        facts:
          type: [integer, "null"]
          format: int64
          minimum: 0
        successOnly:
          type: boolean
        source:
          type: string
    EconomyAnalyticsProductMetric:
      type: object
      additionalProperties: false
