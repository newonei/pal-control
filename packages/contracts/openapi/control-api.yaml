        verified:
          type: boolean
        evidenceType:
          type: string
          minLength: 1
          maxLength: 64
        evidenceReference:
          type: string
          minLength: 1
          maxLength: 256
        evidenceHash:
          type: string
          pattern: "^[A-Fa-f0-9]{64}$"
        observedWorldId:
          type: [string, "null"]
          pattern: "^[A-Fa-f0-9]{32}$"
        blockingTransactions:
          type: integer
          minimum: 0
          default: 0
        allGatesPassed:
          type: boolean
          default: false
        blockerCodes:
          type: [array, "null"]
          items:
            type: string
    WeeklyRolloverOperation:
      type: object
      additionalProperties: true
      required:
        - operationId
        - serverId
        - fromSeasonId
        - fromWorldId
        - targetWorldId
        - rulesVersion
        - currentStep
        - revision
        - newSeasonCommitted
        - completedSteps
      properties:
        operationId:
          type: string
          format: uuid
        serverId:
          type: string
        fromSeasonId:
          type: string
          format: uuid
        fromWorldId:
          type: string
          pattern: "^[A-F0-9]{32}$"
        targetWorldId:
          type: string
          pattern: "^[A-F0-9]{32}$"
        rulesVersion:
          type: string
        currentStep:
          $ref: "#/components/schemas/WeeklyRolloverStep"
        revision:
          type: integer
          format: int64
          minimum: 0
        newSeasonCommitted:
          type: boolean
        completedSteps:
          type: array
          items:
            type: object
            additionalProperties: true
    WeeklyRolloverResponse:
      type: object
      additionalProperties: false
      required: [operation, requiredStepKey]
      properties:
        operation:
          $ref: "#/components/schemas/WeeklyRolloverOperation"
        requiredStepKey:
          type: [string, "null"]
          pattern: "^[a-f0-9]{64}$"
    SeasonRewardGrant:
      type: object
      additionalProperties: false
      required: [accountId, currency, targetSeasonId, amount, rewardKey]
      properties:
        accountId:
          type: string
          format: uuid
        currency:
          type: string
          enum: [MarketCoin, SeasonVoucher]
        targetSeasonId:
          type: [string, "null"]
          format: uuid
        amount:
          type: integer
          format: int64
          minimum: 1
          maximum: 9007199254740991
        rewardKey:
          type: string
          minLength: 1
          maxLength: 64
    SeasonSettlementJob:
      type: object
      additionalProperties: true
      required:
        - jobId
        - kind
        - sourceSeasonId
        - rulesVersion
        - frameworkVersion
        - jobKey
        - payloadHash
        - state
        - revision
        - items
      properties:
        jobId:
          type: string
          format: uuid
        kind:
          type: string
          enum: [SeasonVoucherExpiry, Reward]
        sourceSeasonId:
          type: string
          format: uuid
        rulesVersion:
          type: string
        frameworkVersion:
          type: string
        jobKey:
          type: string
        payloadHash:
          type: string
          pattern: "^[a-f0-9]{64}$"
        state:
          type: string
          enum: [Prepared, Running, Completed]
        revision:
          type: integer
          format: int64
          minimum: 0
        items:
          type: array
          items:
            type: object
            additionalProperties: true
    FederationProfileRequest:
      type: object
      additionalProperties: false
      required: [protocolVersion, callerServerId, targetServerId, identityKeyId, subjectToken]
      properties:
        protocolVersion:
          type: integer
          enum: [2]
        callerServerId:
          type: string
          pattern: "^[a-z][a-z0-9-]{1,31}$"
        targetServerId:
          type: string
          pattern: "^[a-z][a-z0-9-]{1,31}$"
        identityKeyId:
          type: string
          pattern: "^[a-z][a-z0-9-]{2,47}$"
        subjectToken:
          type: string
          pattern: "^fed2_[A-Za-z0-9_-]{43}$"
          description: Irreversible caller/target/key-bound HMAC subject; never a raw platform identifier.
    FederationSeasonProfile:
      type: object
      additionalProperties: false
      required: [code, displayName, startsAt, endsAt, state]
      properties:
        code:
          type: string
        displayName:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        state:
          type: string
          enum: [draft, scheduled, active, closed, archived]
    FederationBalanceProfile:
      type: object
      additionalProperties: false
      required: [marketCoin, seasonVoucher]
      properties:
        marketCoin:
          type: integer
          format: int64
          minimum: 0
          maximum: 9007199254740991
          description: Permanent currency on this node; it cannot be transferred by federation.
        seasonVoucher:
          type: integer
          format: int64
          minimum: 0
          maximum: 9007199254740991
          description: Current-node weekly currency; it cannot be transferred by federation.
    FederationCompatibilityProfile:
      type: object
      additionalProperties: false
      required:
        - combinationId
        - matrixVersion
        - matrixSha256
        - status
        - gameVersion
        - steamBuild
        - palDefenderVersion
        - ue4ssCommit
        - nativeProtocolVersion
        - nativeModVersion
        - bridgeAvailability
        - capabilities
        - verifiedAt
      properties:
        combinationId:
          type: string
          pattern: "^[a-z][a-z0-9.-]{2,95}$"
        matrixVersion:
          type: string
          pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        matrixSha256:
          type: string
          pattern: "^[a-f0-9]{64}$"
        status:
          type: string
          enum: [stable, experimental, quarantined]
        gameVersion:
          type: string
          pattern: "^v[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$"
        steamBuild:
          type: string
          pattern: "^(unknown|[0-9]{6,12})$"
        palDefenderVersion:
          type: string
        ue4ssCommit:
          type: string
          pattern: "^(unknown|[a-f0-9]{40})$"
        nativeProtocolVersion:
          type: string
        nativeModVersion:
          type: string
        bridgeAvailability:
          type: string
          enum: [available, unavailable, unknown]
        capabilities:
          type: array
          minItems: 1
          maxItems: 64
          uniqueItems: true
          items:
            type: string
        verifiedAt:
          type: string
          format: date-time
    FederationLocalProfile:
      type: object
      additionalProperties: false
      required:
        - serverId
        - accountExists
        - accountDisplayName
        - season
        - balances
        - balancesAvailable
        - unavailableReason
        - compatibility
        - observedAt
      properties:
        serverId:
          type: string
          pattern: "^[a-z][a-z0-9-]{1,31}$"
        accountExists:
          type: boolean
        accountDisplayName:
          type: [string, "null"]
        season:
          oneOf:
            - $ref: "#/components/schemas/FederationSeasonProfile"
            - type: "null"
        balances:
          oneOf:
            - $ref: "#/components/schemas/FederationBalanceProfile"
            - type: "null"
        balancesAvailable:
          type: boolean
        unavailableReason:
          type: [string, "null"]
        compatibility:
          $ref: "#/components/schemas/FederationCompatibilityProfile"
        observedAt:
          type: string
          format: date-time
    FederationNodeSummary:
      type: object
      additionalProperties: false
