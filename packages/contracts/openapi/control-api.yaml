        online:
          type: boolean
        level:
          type: [integer, "null"]
    LiveMapSnapshot:
      type: object
      required:
        - serverId
        - streamId
        - sequence
        - status
        - source
        - generatedAt
        - sampleIntervalMs
        - staleAfterMs
        - unavailableAfterMs
        - coordinateSpace
        - items
