      properties:
        maintenance:
          $ref: "#/components/schemas/ExtractionOperationGateState"
        readyForWorldSwitch:
          type: boolean
        activeOperations:
          type: integer
          minimum: 0
        blockingOrders:
          type: array
          items:
            $ref: "#/components/schemas/ExtractionBlockingOrder"
        blockingRuns:
          type: array
          items:
            $ref: "#/components/schemas/ExtractionBlockingRun"
