        ready:
          type: boolean
        pending:
          type: integer
          minimum: 0
        capacity:
          type: integer
          minimum: 0
        utilizationPercent:
          type: number
          minimum: 0
        oldestAgeSeconds:
          type: [number, "null"]
          minimum: 0
        states:
          type: [object, "null"]
          additionalProperties:
            type: integer
            minimum: 0
    EconomyUncertainObservability:
      type: object
      additionalProperties: false
      required:
        - orders
        - deliveries
        - deliveryReceipts
        - partialDeliveryReceipts
        - resourceSettlements
        - outbox
      properties:
        orders: { type: integer, minimum: 0 }
        deliveries: { type: integer, minimum: 0 }
        deliveryReceipts: { type: integer, minimum: 0 }
        partialDeliveryReceipts: { type: integer, minimum: 0 }
        resourceSettlements: { type: integer, minimum: 0 }
        outbox: { type: integer, minimum: 0 }
    EconomyInvariantObservability:
      type: object
      additionalProperties: false
      required:
        - ledgerStreamCount
        - ledgerMismatchCount
        - settlementCreditMismatchCount
        - conserved
      properties:
        ledgerStreamCount: { type: integer, minimum: 0 }
        ledgerMismatchCount: { type: integer, minimum: 0 }
        settlementCreditMismatchCount: { type: integer, minimum: 0 }
        conserved: { type: boolean }
    EconomyIdentityObservability:
      type: object
      additionalProperties: false
      description: Aggregate counts only; no identity or identity fingerprint is exported.
      required:
        - structuralConflictCount
        - lifetimeRejectedConflictCount
        - recentRejectedConflictCount
        - windowMinutes
        - consistent
      properties:
        structuralConflictCount: { type: integer, minimum: 0 }
        lifetimeRejectedConflictCount: { type: integer, minimum: 0 }
        recentRejectedConflictCount: { type: integer, minimum: 0 }
        windowMinutes: { type: integer, minimum: 1 }
        consistent: { type: boolean }
    EconomyRuntimeDependencyObservability:
      type: object
      additionalProperties: false
      description: Stable blocker codes only; exception messages and dependency addresses are not exported.
      required:
        - consistent
        - purchaseBlockerCodes
        - resourceExchangeBlockerCodes
      properties:
        consistent:
          type: boolean
        purchaseBlockerCodes:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: "^[A-Z][A-Z0-9_]+$"
        resourceExchangeBlockerCodes:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: "^[A-Z][A-Z0-9_]+$"
    EconomyConsistencyObservability:
      type: object
      additionalProperties: false
      required:
        - consistent
        - blockerCodes
        - purchaseBlockerCodes
        - resourceExchangeBlockerCodes
        - gameVersion
        - nativeConnected
        - nativeProtocolVersion
        - nativeGameBuild
        - nativeModVersion
      properties:
        consistent:
          type: boolean
        blockerCodes:
          type: array
          uniqueItems: true
          items: { type: string }
        purchaseBlockerCodes:
          type: array
          uniqueItems: true
          items: { type: string }
        resourceExchangeBlockerCodes:
          type: array
          uniqueItems: true
          items: { type: string }
        gameVersion:
          type: [string, "null"]
        nativeConnected:
          type: boolean
        nativeProtocolVersion:
          type: [string, "null"]
        nativeGameBuild:
          type: [string, "null"]
        nativeModVersion:
          type: [string, "null"]
    EconomyBackupAgeObservability:
      type: object
      additionalProperties: false
      required:
        - available
        - latestCreatedAt
        - ageSeconds
        - maximumAgeSeconds
        - requiredForWrites
        - fresh
      properties:
        available: { type: boolean }
        latestCreatedAt:
          type: [string, "null"]
          format: date-time
        ageSeconds:
          type: [number, "null"]
          minimum: 0
        maximumAgeSeconds:
          type: number
          minimum: 1
        requiredForWrites: { type: boolean }
        fresh: { type: boolean }
    EconomyAnalyticsCount:
      type: object
      additionalProperties: false
      required: [value, suppressed]
      properties:
        value:
          type: [integer, "null"]
          format: int64
          minimum: 0
        suppressed:
          type: boolean
    EconomyAnalyticsRate:
      type: object
      additionalProperties: false
      required: [numerator, denominator, basisPoints, suppressed, denominatorComplete]
      properties:
        numerator:
          type: [integer, "null"]
          format: int64
          minimum: 0
        denominator:
          type: [integer, "null"]
          format: int64
          minimum: 0
        basisPoints:
          type: [integer, "null"]
          minimum: 0
          maximum: 10000
        suppressed:
          type: boolean
        denominatorComplete:
          type: boolean
    EconomyAnalyticsWindow:
      type: object
      additionalProperties: false
      required: [from, to, dateBasis, stable, stableThrough, timeZoneId]
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        dateBasis:
          type: string
          enum: [business, utc]
        stable:
          type: boolean
          description: False when the selected interval includes the current date.
        stableThrough:
          type: string
          format: date
        timeZoneId:
          type: string
    EconomyAnalyticsPrivacy:
      type: object
      additionalProperties: false
      required: [minimumCohortSize, suppressionRule, containsPlayerIdentifiers]
      properties:
        minimumCohortSize:
          type: integer
