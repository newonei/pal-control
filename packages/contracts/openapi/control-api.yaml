        orderId:
          type: string
          format: uuid
        state:
          type: string
          enum: [PendingDelivery, Dispatching, DeliveryFailed, DeliveryUncertain]
        updatedAt:
          type: string
          format: date-time
    ExtractionBlockingRun:
      type: object
      additionalProperties: false
      required: [runId, state, updatedAt]
      properties:
        runId:
          type: string
          format: uuid
        state:
          type: string
          enum: [Quoted, Consuming, Removed, Uncertain]
        updatedAt:
          type: string
          format: date-time
