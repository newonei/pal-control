          pattern: "^[A-F0-9]{32}$"
        currentSeasonEndsAt:
          type: [string, "null"]
          format: date-time
        actualWorldId:
          type: string
          pattern: "^[A-F0-9]{32}$"
        targetSeasonCode:
          type: string
        targetSeasonStartsAt:
          type: string
          format: date-time
        targetSeasonEndsAt:
          type: string
          format: date-time
