      properties:
        enabled:
          type: boolean
        connected:
          type: boolean
        outcome:
          type: string
          enum: [disabled, success, failed, uncertain]
        error:
          oneOf:
            - $ref: "#/components/schemas/ApiError"
            - type: "null"
