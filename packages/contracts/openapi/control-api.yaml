openapi: 3.1.0
info:
  title: Pal Control API
  version: 0.4.0
  license:
    name: MIT
    identifier: MIT
  description: >-
    Browser-facing API for Palworld operations. The official Palworld REST API
    and native mod bridge are internal adapters and must not be exposed directly.
    Management operations require a configured administrator API key and are
    additionally restricted to the loopback management boundary. Privileged
    economy and season writes also require a TOTP code and an auditable reason.
    Player-portal sessions use a separate cookie identity and never authorize
    management operations. Non-loopback deployments require HTTPS at a trusted
    reverse proxy in addition to these application controls.
servers:
  - url: http://127.0.0.1:5180/api/v1
    description: Local development
tags:
  - name: Servers
    description: Server connectivity, health and effective capabilities.
  - name: Configuration
    description: Versioned Palworld server settings with guarded, partial updates.
  - name: Players
    description: Player identity, session and summary data.
  - name: LiveMap
    description: Ephemeral, read-only online player position snapshots and streams.
  - name: Inventory
    description: Versioned inventory reads and guarded transactions.
  - name: Pals
    description: Stable Pal instance reads and low-risk mutations.
  - name: Announcements
    description: Announcement drafts, schedules and publishing.
  - name: InGameNotifications
    description: Fail-closed server-native Palworld notification presets and dispatch commands.
  - name: Saves
    description: Active-world save status and explicit official REST save commands.
  - name: Backups
    description: Read-only native snapshots and checksum-verified managed backups.
  - name: PalDefender
    description: >-
      Allowlisted access to the loopback-only PalDefender REST API. Reads are
      synchronous; writes are durably queued and audited before dispatch.
  - name: Commands
    description: Asynchronous command status and event streaming.
  - name: Extraction
    description: Local extraction-mode economy, shop, delivery, and settlement views.
  - name: ExtractionAdmin
    description: Loopback-only extraction economy administration and weekly rollover controls.
  - name: EconomyContent
    description: >-
      Versioned Scheme A shop, sell allow-list, exchange-zone, task and rotation
      definitions with guarded draft validation, publication and rollback.
  - name: EconomyObservability
    description: Privacy-safe economy state, latency, invariant, alert, backup and circuit metrics.
  - name: EconomyAnalytics
    description: >-
      Privacy-safe gameplay funnel, conversion, zone and currency aggregates
      recomputed from authoritative SQLite facts.
  - name: AdminSecurity
    description: Administrator identity and immutable security-audit projections.
  - name: PlayerPortal
    description: >-
      Public player self-service endpoints. Authenticated player identity is
      derived exclusively from the HttpOnly session cookie; these operations
      never accept a userId override in the query string or business request body.
  - name: TeamEconomy
    description: >-
      Same-server weekly team goals and rankings projected only from authoritative
      settled resources, delivered orders, and reliable-task ranking rewards.
  - name: Federation
    description: >-
      Read-only multi-server registry, compatibility health, and HMAC-subject
      account aggregation. Every Palworld server retains its own authoritative
      write plane; cross-server wallet or inventory transfer is not supported.
paths:
  /servers/{serverId}/capabilities:
    get:
      tags: [Servers]
      summary: Get effective server capabilities
      operationId: getServerCapabilities
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Capability snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerCapabilities"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /servers/{serverId}/game-catalog:
    get:
      tags: [Servers]
      summary: Get the searchable Palworld resource catalog
      description: >-
        Returns the bundled, versioned item, Pal, egg and technology reference
        snapshot together with server-verified PalDefender template metadata.
        Template JSON bodies are never exposed. Templates that fail parsing or
        exceed the safety policy remain visible but are marked non-selectable.
      operationId: getGameResourceCatalog
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - name: If-None-Match
          in: header
          description: Exact ETag returned by a previous catalog read.
          schema:
            type: string
      responses:
        "200":
          description: Current resource and template catalog
          headers:
            ETag:
              required: true
              description: Revision token for the bundled snapshot and current template set.
              schema:
                type: string
            Cache-Control:
              required: true
              description: Private five-minute cache policy.
              schema:
                type: string
                const: "private, max-age=300"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameResourceCatalog"
        "304":
          description: The current catalog revision exactly matches If-None-Match.
          headers:
            ETag:
              required: true
              schema:
                type: string
            Cache-Control:
              required: true
              schema:
                type: string
                const: "private, max-age=300"
        "404":
          description: The requested server ID is not configured on this Control API instance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: The bundled game resource catalog is missing, empty, or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /servers/{serverId}/economy-content/current:
    get:
      tags: [EconomyContent]
      summary: Get the currently published economy-content version
      operationId: getCurrentEconomyContent
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Current immutable content version, pointer and rotation identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomyContentCurrent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/EconomyContentError"
  /servers/{serverId}/economy-content/versions:
    get:
      tags: [EconomyContent]
      summary: List immutable published economy-content versions
      operationId: listEconomyContentVersions
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Published versions ordered by the content store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomyContentVersionList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/EconomyContentError"
  /servers/{serverId}/economy-content/drafts:
    get:
      tags: [EconomyContent]
      summary: List economy-content drafts
      operationId: listEconomyContentDrafts
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - name: includePublished
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Drafts visible to the current administrator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomyContentDraftList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/EconomyContentError"
    post:
      tags: [EconomyContent]
      summary: Create an editable economy-content draft
      operationId: createEconomyContentDraft
      parameters:
        - $ref: "#/components/parameters/ServerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEconomyContentDraftRequest"
      responses:
        "201":
          description: Created draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomyContentDraft"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/EconomyContentError"
  /servers/{serverId}/economy-content/drafts/{draftId}:
    get:
      tags: [EconomyContent]
      summary: Get an economy-content draft
      operationId: getEconomyContentDraft
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/EconomyContentDraftId"
      responses:
        "200":
          description: Current draft snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomyContentDraft"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/EconomyContentError"
    put:
      tags: [EconomyContent]
      summary: Replace a draft definition using optimistic concurrency
      operationId: updateEconomyContentDraft
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/EconomyContentDraftId"
        - $ref: "#/components/parameters/EconomyContentRevision"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEconomyContentDraftRequest"
      responses:
        "200":
          description: Updated draft snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomyContentDraft"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/EconomyContentError"
  /servers/{serverId}/economy-content/drafts/{draftId}/diff:
    get:
      tags: [EconomyContent]
      summary: Diff a draft against its selected base version
      operationId: diffEconomyContentDraft
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/EconomyContentDraftId"
      responses:
        "200":
          description: Stable field-level draft diff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomyContentDiff"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/EconomyContentError"
  /servers/{serverId}/economy-content/drafts/{draftId}/validate:
    post:
      tags: [EconomyContent]
      summary: Validate the exact current draft revision
      operationId: validateEconomyContentDraft
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/EconomyContentDraftId"
        - $ref: "#/components/parameters/EconomyContentRevision"
      responses:
        "200":
          description: Validation result without activating content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomyContentValidationResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/EconomyContentError"
  /servers/{serverId}/economy-content/drafts/{draftId}/publish:
    post:
      tags: [EconomyContent]
      summary: Publish a validated immutable economy-content version
      description: >-
        Requires maintenance mode, zero active player operations, and no
        resource run that has entered consumption or an uncertain state. Pure
        Quoted runs may remain and are invalidated by content evidence. The confirmation must
        exactly equal `PUBLISH ECONOMY CONTENT` and the business date must be
        the server's current configured business date.
      operationId: publishEconomyContentDraft
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/EconomyContentDraftId"
        - $ref: "#/components/parameters/EconomyContentRevision"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/AdminTotp"
        - $ref: "#/components/parameters/AdminReason"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishEconomyContentRequest"
      responses:
        "200":
          description: Published version and atomically updated current pointer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomyContentPublishResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/EconomyContentError"
  /servers/{serverId}/economy-content/rollback:
    post:
      tags: [EconomyContent]
      summary: Roll the current content pointer back to an immutable version
      description: >-
        Requires maintenance mode and a fully drained settlement boundary. The
        confirmation must exactly equal `ROLLBACK ECONOMY CONTENT`. A null
        targetVersionId selects the previous published version.
      operationId: rollbackEconomyContent
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/AdminTotp"
        - $ref: "#/components/parameters/AdminReason"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RollbackEconomyContentRequest"
      responses:
        "200":
          description: Atomically updated current pointer or idempotent replay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomyContentRollbackResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/EconomyContentError"
  /servers/{serverId}/configuration:
    get:
      tags: [Configuration]
      summary: Read every setting in PalWorldSettings.ini
      description: >-
        Returns the complete ordered setting collection together with inferred
        input metadata and default values. Password values are never returned;
        callers only receive whether a sensitive value is currently present.
      operationId: getServerConfiguration
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Current server configuration snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerConfigurationDocument"
        "404":
          description: The requested server ID or configuration file does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: PalWorldSettings.ini is present but structurally invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      tags: [Configuration]
      summary: Apply a guarded partial server configuration update
      description: >-
        Applies only the named changes, preserving the order and spelling of all
        other settings. The revision must match the latest read. A successful
        update is written atomically after creating a timestamped backup.
      operationId: updateServerConfiguration
      parameters:
        - $ref: "#/components/parameters/ServerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerConfigurationUpdate"
      responses:
        "200":
          description: Updated server configuration snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerConfigurationDocument"
        "400":
          description: Unknown setting, invalid value, or malformed update
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ValidationProblemDetails"
        "404":
          description: The requested server ID or configuration file does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: The configuration changed after the supplied revision was read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: PalWorldSettings.ini is present but structurally invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /servers/{serverId}/info:
    get:
      tags: [Servers]
      summary: Get server information through the local official REST adapter
      operationId: getServerInfo
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Server information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PalworldServerInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/metrics:
    get:
      tags: [Servers]
      summary: Get live server metrics through the local official REST adapter
      operationId: getServerMetrics
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Live server metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PalworldMetrics"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/bridge/status:
    get:
      tags: [Servers]
      summary: Get the local Native Mod bridge handshake state
      operationId: getNativeBridgeStatus
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Native bridge status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NativeBridgeStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /servers/{serverId}/players:
    get:
      tags: [Players]
      summary: List players
      operationId: listPlayers
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - name: q
          in: query
          schema:
            type: string
        - name: online
          in: query
          schema:
            type: boolean
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Player page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/live-map:
    get:
      tags: [LiveMap]
      summary: Get the most recent online player position snapshot
      description: >-
        Returns the shared server-side sample. A failed upstream sample never
        replaces the last known player positions with an empty list. Position
        data is ephemeral and is not persisted as player movement history.
      operationId: getLiveMapSnapshot
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - name: If-None-Match
          in: header
          description: ETag returned by the previous snapshot read.
          schema:
            type: string
      responses:
        "200":
          description: Latest complete live-map snapshot
          headers:
            ETag:
              description: Stream and sequence token.
              required: true
              schema:
                type: string
            Cache-Control:
              description: Snapshot cache policy.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveMapSnapshot"
        "304":
          description: The current snapshot matches If-None-Match.
        "401":
          $ref: "#/components/responses/Unauthorized"
  /servers/{serverId}/live-map/events:
    get:
      tags: [LiveMap]
      summary: Subscribe to complete online player position snapshots
      description: >-
        Emits a current complete snapshot immediately and then the newest
        complete snapshot after each upstream sample. Slow consumers may lose
        intermediate samples but always converge on the newest complete state.
      operationId: subscribeLiveMap
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - name: Last-Event-ID
          in: header
          description: Accepted for EventSource reconnection; a full current snapshot is always sent first.
          schema:
            type: string
      responses:
        "200":
          description: >-
            Server-sent event stream. `snapshot` events contain a
            LiveMapSnapshot JSON object and `heartbeat` events contain stream
            liveness metadata.
          headers:
            Cache-Control:
              schema:
                type: string
            X-Accel-Buffering:
              schema:
                type: string
                const: "no"
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          description: The live-map subscriber limit has been reached.
  /servers/{serverId}/players/native-probe:
    get:
      tags: [Players]
      summary: Probe live PalPlayerState objects on the Unreal game thread
      operationId: probeNativePlayers
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Read-only native player object probe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NativePlayerProbe"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/players/native-schema:
    get:
      tags: [Players]
      summary: Read PalPlayerState reflection metadata on the Unreal game thread
      operationId: getNativePlayerSchema
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Filtered reflection metadata without pointers or memory offsets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NativePlayerSchema"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/players/progression/native-schema:
    get:
      tags: [Players]
      summary: Inspect player progression reflection mappings and native function signatures
      operationId: getNativePlayerProgressionSchema
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Read-only progression reflection schema
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/players/progression/native-probe:
    get:
      tags: [Players]
      summary: Read all loaded native player progression snapshots
      operationId: probeNativePlayerProgression
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Loaded player progression snapshots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NativePlayerProgressionProbe"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/players/{playerId}/progression:
    get:
      tags: [Players]
      summary: Read a loaded player's versioned progression snapshot
      operationId: getPlayerProgression
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/PlayerId"
      responses:
        "200":
          description: Player progression snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerProgression"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/players/{playerId}/progression/mutations:
    post:
      tags: [Players]
      summary: Preview or execute one guarded native player progression operation
      operationId: mutatePlayerProgression
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/PlayerId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerProgressionMutationRequest"
      responses:
        "200":
          description: Mutation preview or verified native result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: Invalid or unsupported progression operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/players/{playerId}:
    get:
      tags: [Players]
      summary: Get player details
      operationId: getPlayer
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/PlayerId"
      responses:
        "200":
          description: Player details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          $ref: "#/components/responses/NotFound"
  /servers/{serverId}/players/{playerId}/inventory:
    get:
      tags: [Inventory]
      summary: Read a versioned inventory snapshot
      operationId: getPlayerInventory
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/PlayerId"
      responses:
        "200":
          description: Inventory snapshot
          headers:
            ETag:
              description: Revision token for mutation preconditions
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventorySnapshot"
        "409":
          $ref: "#/components/responses/PlayerOffline"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/inventory/native-schema:
    get:
      tags: [Inventory]
      summary: Read filtered inventory reflection metadata on the Unreal game thread
      operationId: getNativeInventorySchema
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Inventory candidate types and fields without values or offsets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NativeInventorySchema"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/inventory/native-probe:
    get:
      tags: [Inventory]
      summary: Probe player inventory containers and slots on the Unreal game thread
      operationId: probeNativeInventory
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Read-only inventory container probe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NativeInventoryProbe"
        "503":
          $ref: "#/components/responses/Unavailable"
  /servers/{serverId}/players/{playerId}/inventory/transactions:
    post:
      tags: [Inventory, Commands]
      summary: Preview or submit an inventory transaction
      operationId: createInventoryTransaction
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - $ref: "#/components/parameters/PlayerId"
        - $ref: "#/components/parameters/IdempotencyKey"
