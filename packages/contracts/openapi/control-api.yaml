        serverId:
          type: string
        streamId:
          type: string
          format: uuid
          description: Changes whenever the Control API live-map sampler restarts.
        sequence:
          type: integer
          format: int64
          minimum: 0
        status:
          type: string
          enum: [live, stale, unavailable]
        source:
          type: string
          const: palworld-official-rest.players
        observedAt:
          type: [string, "null"]
          format: date-time
          description: Time of the last successful official REST sample.
        generatedAt:
          type: string
          format: date-time
        sampleIntervalMs:
          type: integer
          minimum: 500
          maximum: 5000
        staleAfterMs:
          type: integer
          minimum: 1
        unavailableAfterMs:
          type: integer
          minimum: 1
        coordinateSpace:
          $ref: "#/components/schemas/LiveMapCoordinateSpace"
        items:
          type: array
          items:
            $ref: "#/components/schemas/LiveMapPlayer"
    LiveMapCoordinateSpace:
      type: object
