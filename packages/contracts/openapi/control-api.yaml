        suppressionRule:
          type: string
        containsPlayerIdentifiers:
          type: boolean
          const: false
    EconomyAnalyticsSource:
      type: object
      additionalProperties: false
      required: [kind, schemaVersion, asOf, recomputationHash, tables, rowsRead, complete]
      properties:
        kind:
          type: string
          const: sqlite-authoritative-recomputation
        schemaVersion:
          type: integer
          const: 1
        asOf:
          type: string
          format: date-time
        recomputationHash:
          type: string
          pattern: "^[a-f0-9]{64}$"
        tables:
          type: array
          uniqueItems: true
          items:
            type: string
        rowsRead:
          type: integer
          format: int64
          minimum: 0
        complete:
          type: boolean
    EconomyAnalyticsFunnelStage:
      type: object
      additionalProperties: false
      required: [key, label, accounts, facts, successOnly, source]
