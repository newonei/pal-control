      type: object
      additionalProperties: false
      required:
        - mapUnits
        - worldUnits
        - scale
        - worldXOffset
        - worldYOffset
        - formula
      properties:
        mapUnits:
          type: string
          const: paldefender-map-units
        worldUnits:
          type: string
          const: unreal-centimeters
        scale:
          type: number
          format: double
          const: 459
        worldXOffset:
          type: number
          format: double
          const: -123888
        worldYOffset:
          type: number
          format: double
          const: 158000
        formula:
          type: string
          const: "worldX = mapY * scale + worldXOffset; worldY = mapX * scale + worldYOffset"
    PlayerExtractionZoneStatus:
      type: object
      additionalProperties: false
      required:
